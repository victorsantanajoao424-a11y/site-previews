<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Barbearia Tarantino - São Paulo Zona Sul. Cortes masculinos, barba e muito mais. Avaliação 4.9/5 no Google. Agende pelo WhatsApp!">
<title>Barbearia Tarantino | São Paulo Zona Sul</title>
<style>
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  :root {
    --bg-primary: #0A0A0A;
    --bg-secondary: #111111;
    --bg-card: #1A1A1A;
    --gold: #F59E0B;
    --gold-light: #FCD34D;
    --gold-dark: #D97706;
    --whatsapp: #25D366;
    --whatsapp-dark: #1DA851;
    --text-primary: #FFFFFF;
    --text-secondary: #9CA3AF;
    --border: #2A2A2A;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  html {
    scroll-behavior: smooth;
  }

  body {
    font-family: var(--font);
    background-color: var(--bg-primary);
    color: var(--text-primary);
    line-height: 1.6;
    overflow-x: hidden;
  }

  /* ===== HEADER ===== */
  header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 1000;
    background: rgba(10, 10, 10, 0.96);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 16px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .header-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
  }

  .logo-icon {
    font-size: 24px;
    line-height: 1;
  }

  .logo-text {
    font-size: 15px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 0.5px;
    line-height: 1.2;
  }

  .logo-sub {
    font-size: 10px;
    color: var(--text-secondary);
    font-weight: 400;
    display: block;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  nav {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  nav a {
    color: var(--text-secondary);
    text-decoration: none;
    font-size: 13px;
    font-weight: 500;
    padding: 6px 10px;
    border-radius: 6px;
    transition: color 0.2s, background 0.2s;
    white-space: nowrap;
  }

  nav a:hover {
    color: var(--gold);
    background: rgba(245, 158, 11, 0.08);
  }

  .nav-cta {
    background: var(--whatsapp) !important;
    color: #fff !important;
    padding: 7px 14px !important;
    border-radius: 20px !important;
    font-weight: 600 !important;
    font-size: 12px !important;
    margin-left: 6px;
    transition: background 0.2s, transform 0.2s !important;
  }

  .nav-cta:hover {
    background: var(--whatsapp-dark) !important;
    transform: scale(1.04);
    color: #fff !important;
  }

  @media (max-width: 600px) {
    nav a:not(.nav-cta) {
      display: none;
    }
  }

  /* ===== HERO ===== */
  #inicio {
    min-height: 100vh;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(245, 158, 11, 0.12) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(245, 158, 11, 0.07) 0%, transparent 50%),
      linear-gradient(160deg, #0A0A0A 0%, #0f0e0b 40%, #0A0A0A 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 100px 20px 60px;
    position: relative;
    overflow: hidden;
  }

  .hero-decoration {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
  }

  .hero-deco-1 {
    width: 400px;
    height: 400px;
    border: 1px solid rgba(245, 158, 11, 0.08);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  .hero-deco-2 {
    width: 600px;
    height: 600px;
    border: 1px solid rgba(245, 158, 11, 0.04);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  .hero-deco-3 {
    width: 800px;
    height: 800px;
    border: 1px solid rgba(245, 158, 11, 0.02);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(245, 158, 11, 0.1);
    border: 1px solid rgba(245, 158, 11, 0.25);
    color: var(--gold);
    font-size: 12px;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 20px;
    margin-bottom: 24px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .hero-badge span {
    font-size: 14px;
  }

  .hero-title {
    font-size: clamp(36px, 8vw, 80px);
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -1px;
    margin-bottom: 8px;
    background: linear-gradient(135deg, #FFFFFF 0%, var(--gold-light) 50%, var(--gold) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .hero-subtitle-brand {
    font-size: clamp(13px, 2.5vw, 16px);
    color: var(--text-secondary);
    font-weight: 500;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .hero-tagline {
    font-size: clamp(16px, 3.5vw, 22px);
    color: var(--text-primary);
    font-weight: 400;
    max-width: 520px;
    margin: 0 auto 14px;
    line-height: 1.5;
  }

  .hero-tagline strong {
    color: var(--gold);
    font-weight: 700;
  }

  .hero-city {
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
  }

  .hero-city::before {
    content: '📍';
    font-size: 14px;
  }

  .hero-buttons {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    width: 100%;
    max-width: 360px;
    margin: 0 auto 48px;
  }

  @media (min-width: 480px) {
    .hero-buttons {
      flex-direction: row;
      justify-content: center;
    }
  }

  .btn-whatsapp {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: var(--whatsapp);
    color: #fff;
    text-decoration: none;
    font-size: 15px;
    font-weight: 700;
    padding: 14px 28px;
    border-radius: 50px;
    transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 24px rgba(37, 211, 102, 0.35);
    white-space: nowrap;
  }

  .btn-whatsapp:hover {
    background: var(--whatsapp-dark);
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(37, 211, 102, 0.45);
  }

  .btn-outline {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: transparent;
    color: var(--gold);
    text-decoration: none;
    font-size: 15px;
    font-weight: 600;
    padding: 13px 24px;
    border-radius: 50px;
    border: 1.5px solid var(--gold);
    transition: background 0.2s, transform 0.2s;
    white-space: nowrap;
  }

  .btn-outline:hover {
    background: rgba(245, 158, 11, 0.1);
    transform: translateY(-2px);
  }

  .hero-stats {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 32px;
    flex-wrap: wrap;
  }

  .hero-stat {
    text-align: center;
  }

  .hero-stat-value {
    font-size: 24px;
    font-weight: 800;
    color: var(--gold);
    line-height: 1;
  }

  .hero-stat-label {
    font-size: 11px;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 4px;
  }

  .hero-stat-divider {
    width: 1px;
    height: 32px;
    background: var(--border);
  }

  /* ===== SECTION BASE ===== */
  section {
    padding: 72px 20px;
  }

  .section-alt {
    background: var(--bg-secondary);
  }

  .container {
    max-width: 1100px;
    margin: 0 auto;
  }

  .section-header {
    text-align: center;
    margin-bottom: 48px;
  }

  .section-label {
    display: inline-block;
    font-size: 11px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 2.5px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .section-title {
    font-size: clamp(26px, 5vw, 38px);
    font-weight: 800;
    color: var(--text-primary);
    line-height: 1.15;
    letter-spacing: -0.5px;
  }

  .section-title span {
    color: var(--gold);
  }

  .section-desc {
    font-size: 15px;
    color: var(--text-secondary);
    max-width: 480px;
    margin: 12px auto 0;
    line-height: 1.7;
  }

  /* ===== SERVICES ===== */
  #servicos {
    background: var(--bg-primary);
  }

  .services-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 16px;
  }

  @media (min-width: 480px) {
    .services-grid {
      grid-template-columns: repeat(2, 1fr);
    }
  }

  @media (min-width: 900px) {
    .services-grid {
      grid-template-columns: repeat(4, 1fr);
    }
  }

  .service-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px 20px;
    text-align: center;
    position: relative;
    overflow: hidden;
    transition: transform 0.25s, border-color 0.25s, box-shadow 0.25s;
  }

  .service-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    opacity: 0;
    transition: opacity 0.25s;
  }

  .service-card:hover {
    transform: translateY(-6px);
    border-color: rgba(245, 158, 11, 0.3);
    box-shadow: 0 16px 48px rgba(0, 0, 0, 0.4);
  }

  .service-card:hover::before {
    opacity: 1;
  }

  .service-card.featured {
    border-color: rgba(245, 158, 11, 0.35);
    background: linear-gradient(145deg, #1E1A10, #1A1A1A);
  }

  .service-card.featured::before {
    opacity: 1;
  }

  .service-badge-top {
    position: absolute;
    top: 12px;
    right: 12px;
    background: var(--gold);
    color: #000;
    font-size: 9px;
    font-weight: 800;
    padding: 3px 8px;
    border-radius: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .service-icon {
    font-size: 40px;
    margin-bottom: 16px;
    display: block;
    line-height: 1;
  }

  .service-name {
    font-size: 17px;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 8px;
  }

  .service-desc {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.6;
    margin-bottom: 20px;
  }

  .service-price {
    font-size: 28px;
    font-weight: 800;
    color: var(--gold);
    line-height: 1;
  }

  .service-price sup {
    font-size: 14px;
    font-weight: 600;
    vertical-align: top;
    margin-top: 4px;
    display: inline-block;
  }

  .service-cta {
    display: block;
    margin-top: 16px;
    background: rgba(245, 158, 11, 0.1);
    border: 1px solid rgba(245, 158, 11, 0.2);
    color: var(--gold);
    text-decoration: none;
    font-size: 12px;
    font-weight: 600;
    padding: 8px 16px;
    border-radius: 20px;
    transition: background 0.2s, border-color 0.2s;
  }

  .service-cta:hover {
    background: rgba(245, 158, 11, 0.18);
    border-color: rgba(245, 158, 11, 0.4);
  }

  /* ===== REVIEWS ===== */
  #avaliacoes {
    background: var(--bg-secondary);
  }

  .rating-hero {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    margin-bottom: 48px;
    padding: 32px 20px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 20px;
    max-width: 420px;
    margin-left: auto;
    margin-right: auto;
    position: relative;
    overflow: hidden;
  }

  .rating-hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center top, rgba(245, 158, 11, 0.08) 0%, transparent 70%);
  }

  .rating-stars {
    font-size: 28px;
    letter-spacing: 4px;
    line-height: 1;
  }

  .rating-score {
    font-size: 56px;
    font-weight: 900;
    color: var(--gold);
    line-height: 1;
    letter-spacing: -2px;
  }

  .rating-max {
    font-size: 20px;
    color: var(--text-secondary);
    font-weight: 400;
  }

  .rating-total {
    font-size: 14px;
    color: var(--text-secondary);
    font-weight: 500;
  }

  .rating-google {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 4px;
  }

  .google-logo {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #fff;
    font-size: 11px;
    font-weight: 900;
    color: #4285f4;
    font-family: Arial, sans-serif;
    flex-shrink: 0;
  }

  .reviews-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 16px;
  }

  @media (min-width: 640px) {
    .reviews-grid {
      grid-template-columns: repeat(2, 1fr);
    }
  }

  @media (min-width: 900px) {
    .reviews-grid {
      grid-template-columns: repeat(3, 1fr);
    }
  }

  .review-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    position: relative;
    transition: transform 0.2s, border-color 0.2s;
  }

  .review-card:hover {
    transform: translateY(-4px);
    border-color: rgba(245, 158, 11, 0.2);
  }

  .review-quote {
    position: absolute;
    top: 16px;
    right: 20px;
    font-size: 36px;
    color: var(--gold);
    opacity: 0.15;
    font-family: Georgia, serif;
    line-height: 1;
  }

  .review-stars {
    font-size: 14px;
    letter-spacing: 2px;
    margin-bottom: 12px;
    color: var(--gold);
  }

  .review-text {
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.7;
    margin-bottom: 20px;
    font-style: italic;
  }

  .review-author {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .review-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: 800;
    color: #000;
    flex-shrink: 0;
  }

  .review-author-info {
    flex: 1;
  }

  .review-name {
    font-size: 14px;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 2px;
  }

  .review-date {
    font-size: 11px;
    color: var(--text-secondary);
  }

  /* ===== CONTACT ===== */
  #contato {
    background: var(--bg-primary);
  }

  .contact-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 16px;
  }

  @media (min-width: 720px) {
    .contact-grid {
      grid-template-columns: repeat(3, 1fr);
    }
  }

  .contact-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px 20px;
    text-align: center;
    transition: transform 0.2s, border-color 0.2s;
  }

  .contact-card:hover {
    transform: translateY(-4px);
    border-color: rgba(245, 158, 11, 0.25);
  }

  .contact-icon {
    font-size: 32px;
    margin-bottom: 14px;
    display: block;
  }

  .contact-card-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--gold);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 10px;
  }

  .contact-card-text {
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.7;
  }

  .contact-card-text a {
    color: var(--text-primary);
    text-decoration: none;
    font-weight: 600;
    font-size: 18px;
    transition: color 0.2s;
    display: block;
    margin-bottom: 4px;
  }

  .contact-card-text a:hover {
    color: var(--gold);
  }

  .hours-list {
    list-style: none;
    text-align: left;
  }

  .hours-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    font-size: 13px;
    color: var(--text-secondary);
    gap: 12px;
  }

  .hours-item:last-child {
    border-bottom: none;
  }

  .hours-day {
    font-weight: 600;
    color: var(--text-primary);
    min-width: 60px;
  }

  .hours-time {
    color: var(--gold);
    font-weight: 600;
    font-size: 12px;
  }

  .hours-closed {
    color: #EF4444;
    font-size: 12px;
    font-weight: 600;
  }

  .map-placeholder {
    margin-top: 40px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    display: flex;
    align-items: flex-start;
    gap: 20px;
    flex-wrap: wrap;
  }

  .map-pin-area {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: rgba(245, 158, 11, 0.1);
    border: 1px solid rgba(245, 158, 11, 0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    flex-shrink: 0;
  }

  .map-info h4 {
    font-size: 16px;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 6px;
  }

  .map-info p {
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.6;
  }

  .map-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 12px;
    color: var(--gold);
    text-decoration: none;
    font-size: 13px;
    font-weight: 600;
    transition: opacity 0.2s;
  }

  .map-link:hover {
    opacity: 0.8;
  }

  /* ===== CTA SECTION ===== */
  .cta-section {
    background: linear-gradient(135deg, #0f0d06 0%, #1A1500 50%, #0f0d06 100%);
    border-top: 1px solid rgba(245, 158, 11, 0.15);
    border-bottom: 1px solid rgba(245, 158, 11, 0.15);
    text-align: center;
    padding: 72px 20px;
    position: relative;
    overflow: hidden;
  }

  .cta-section::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(245, 158, 11, 0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .cta-title {
    font-size: clamp(24px, 5vw, 40px);
    font-weight: 800;
    color: var(--text-primary);
    margin-bottom: 12px;
    line-height: 1.2;
    position: relative;
  }

  .cta-title span {
    color: var(--gold);
  }

  .cta-desc {
    font-size: 15px;
    color: var(--text-secondary);
    margin-bottom: 32px;
    position: relative;
  }

  /* ===== FLOATING BUTTON ===== */
  .whatsapp-float {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 999;
    width: 60px;
    height: 60px;
    background: var(--whatsapp);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    text-decoration: none;
    box-shadow: 0 4px 20px rgba(37, 211, 102, 0.5), 0 0 0 0 rgba(37, 211, 102, 0.4);
    animation: pulse-wa 2.5s infinite;
    transition: transform 0.2s, background 0.2s;
  }

  .whatsapp-float:hover {
    background: var(--whatsapp-dark);
    transform: scale(1.1);
    animation: none;
  }

  .whatsapp-float-tooltip {
    position: absolute;
    right: 70px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text-primary);
    font-size: 12px;
    font-weight: 600;
    padding: 6px 12px;
    border-radius: 8px;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
    font-family: var(--font);
  }

  .whatsapp-float-tooltip::after {
    content: '';
    position: absolute;
    right: -6px;
    top: 50%;
    transform: translateY(-50%);
    border: 6px solid transparent;
    border-right: none;
    border-left-color: var(--border);
  }

  .whatsapp-float:hover .whatsapp-float-tooltip {
    opacity: 1;
  }
