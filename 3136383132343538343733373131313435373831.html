<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Barbearia Tarantino - São Paulo Zona Sul. Cortes masculinos, barba e muito mais. Agende pelo WhatsApp!">
<title>Barbearia Tarantino | São Paulo Zona Sul</title>
<style>
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  :root {
    --bg-primary: #0A0A0A;
    --bg-secondary: #111111;
    --bg-card: #1A1A1A;
    --gold: #F59E0B;
    --gold-light: #FCD34D;
    --gold-dark: #D97706;
    --whatsapp: #25D366;
    --whatsapp-dark: #1DA851;
    --text-primary: #FFFFFF;
    --text-secondary: #9CA3AF;
    --border: #2A2A2A;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  html {
    scroll-behavior: smooth;
  }

  body {
    font-family: var(--font);
    background-color: var(--bg-primary);
    color: var(--text-primary);
    line-height: 1.6;
    overflow-x: hidden;
  }

  /* ===== HEADER ===== */
  header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 1000;
    background: rgba(10, 10, 10, 0.95);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
    padding: 0 16px;
  }

  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
  }

  .logo-icon {
    font-size: 24px;
    line-height: 1;
  }

  .logo-text {
    font-size: 18px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 0.5px;
    white-space: nowrap;
  }

  .logo-text span {
    color: var(--text-primary);
    font-weight: 300;
  }

  nav {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  nav a {
    color: var(--text-secondary);
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    padding: 6px 12px;
    border-radius: 6px;
    transition: color 0.2s, background 0.2s;
    white-space: nowrap;
  }

  nav a:hover {
    color: var(--gold);
    background: rgba(245, 158, 11, 0.08);
  }

  .nav-cta {
    background: var(--whatsapp) !important;
    color: #fff !important;
    padding: 8px 16px !important;
    border-radius: 8px !important;
    font-weight: 600 !important;
    transition: background 0.2s, transform 0.2s !important;
  }

  .nav-cta:hover {
    background: var(--whatsapp-dark) !important;
    transform: translateY(-1px);
  }

  .hamburger {
    display: none;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
    padding: 4px;
    background: none;
    border: none;
  }

  .hamburger span {
    display: block;
    width: 24px;
    height: 2px;
    background: var(--text-primary);
    border-radius: 2px;
    transition: all 0.3s;
  }

  .mobile-menu {
    display: none;
    position: fixed;
    top: 64px;
    left: 0;
    right: 0;
    background: rgba(10, 10, 10, 0.98);
    border-bottom: 1px solid var(--border);
    padding: 16px;
    z-index: 999;
    flex-direction: column;
    gap: 8px;
  }

  .mobile-menu.open {
    display: flex;
  }

  .mobile-menu a {
    color: var(--text-secondary);
    text-decoration: none;
    font-size: 16px;
    font-weight: 500;
    padding: 12px 16px;
    border-radius: 8px;
    transition: color 0.2s, background 0.2s;
  }

  .mobile-menu a:hover {
    color: var(--gold);
    background: rgba(245, 158, 11, 0.08);
  }

  .mobile-menu .nav-cta {
    background: var(--whatsapp) !important;
    color: #fff !important;
    text-align: center;
  }

  /* ===== HERO ===== */
  #hero {
    min-height: 100vh;
    background: linear-gradient(135deg, #0A0A0A 0%, #0F0A00 40%, #1A1000 70%, #0A0A0A 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 100px 16px 60px;
    position: relative;
    overflow: hidden;
  }

  #hero::before {
    content: '';
    position: absolute;
    top: -200px;
    right: -200px;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(245, 158, 11, 0.12) 0%, transparent 70%);
    pointer-events: none;
  }

  #hero::after {
    content: '';
    position: absolute;
    bottom: -150px;
    left: -150px;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(245, 158, 11, 0.07) 0%, transparent 70%);
    pointer-events: none;
  }

  .hero-decoration {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    pointer-events: none;
    overflow: hidden;
  }

  .hero-decoration::before {
    content: '✂️';
    position: absolute;
    font-size: 200px;
    opacity: 0.03;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) rotate(-15deg);
  }

  .hero-inner {
    max-width: 800px;
    margin: 0 auto;
    text-align: center;
    position: relative;
    z-index: 2;
  }

  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(245, 158, 11, 0.1);
    border: 1px solid rgba(245, 158, 11, 0.3);
    color: var(--gold);
    font-size: 13px;
    font-weight: 600;
    padding: 6px 16px;
    border-radius: 50px;
    margin-bottom: 28px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .hero-title {
    font-size: clamp(36px, 8vw, 80px);
    font-weight: 900;
    line-height: 1.05;
    margin-bottom: 8px;
    letter-spacing: -1px;
  }

  .hero-title .highlight {
    color: var(--gold);
    display: block;
  }

  .hero-city {
    font-size: clamp(14px, 3vw, 18px);
    color: var(--text-secondary);
    font-weight: 500;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .hero-subtitle {
    font-size: clamp(16px, 3vw, 22px);
    color: var(--text-secondary);
    max-width: 560px;
    margin: 0 auto 40px;
    line-height: 1.7;
  }

  .hero-subtitle strong {
    color: var(--text-primary);
  }

  .hero-buttons {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  @media (min-width: 480px) {
    .hero-buttons {
      flex-direction: row;
      justify-content: center;
    }
  }

  .btn-whatsapp {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--whatsapp);
    color: #fff;
    font-size: 16px;
    font-weight: 700;
    padding: 16px 32px;
    border-radius: 12px;
    text-decoration: none;
    transition: all 0.3s;
    box-shadow: 0 4px 24px rgba(37, 211, 102, 0.3);
    letter-spacing: 0.3px;
  }

  .btn-whatsapp:hover {
    background: var(--whatsapp-dark);
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(37, 211, 102, 0.4);
  }

  .btn-secondary {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: transparent;
    color: var(--gold);
    font-size: 16px;
    font-weight: 600;
    padding: 16px 32px;
    border-radius: 12px;
    text-decoration: none;
    border: 1.5px solid var(--gold);
    transition: all 0.3s;
  }

  .btn-secondary:hover {
    background: rgba(245, 158, 11, 0.1);
    transform: translateY(-2px);
  }

  .hero-stats {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 32px;
    margin-top: 56px;
    padding-top: 40px;
    border-top: 1px solid var(--border);
    flex-wrap: wrap;
  }

  .hero-stat {
    text-align: center;
  }

  .hero-stat-value {
    font-size: 32px;
    font-weight: 800;
    color: var(--gold);
    line-height: 1;
    margin-bottom: 4px;
  }

  .hero-stat-label {
    font-size: 13px;
    color: var(--text-secondary);
    font-weight: 500;
  }

  .stat-divider {
    width: 1px;
    height: 48px;
    background: var(--border);
  }

  /* ===== SEÇÕES GERAIS ===== */
  section {
    padding: 80px 16px;
  }

  .section-inner {
    max-width: 1200px;
    margin: 0 auto;
  }

  .section-header {
    text-align: center;
    margin-bottom: 56px;
  }

  .section-tag {
    display: inline-block;
    color: var(--gold);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .section-title {
    font-size: clamp(28px, 5vw, 44px);
    font-weight: 800;
    color: var(--text-primary);
    line-height: 1.2;
    margin-bottom: 16px;
  }

  .section-title em {
    color: var(--gold);
    font-style: normal;
  }

  .section-desc {
    font-size: 16px;
    color: var(--text-secondary);
    max-width: 520px;
    margin: 0 auto;
    line-height: 1.7;
  }

  /* ===== SERVIÇOS ===== */
  #servicos {
    background: var(--bg-secondary);
  }

  .services-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 20px;
  }

  @media (min-width: 480px) {
    .services-grid {
      grid-template-columns: repeat(2, 1fr);
    }
  }

  @media (min-width: 900px) {
    .services-grid {
      grid-template-columns: repeat(4, 1fr);
    }
  }

  .service-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px 24px;
    text-align: center;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }

  .service-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .service-card:hover {
    border-color: rgba(245, 158, 11, 0.4);
    transform: translateY(-4px);
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
  }

  .service-card:hover::before {
    opacity: 1;
  }

  .service-card.featured {
    border-color: rgba(245, 158, 11, 0.5);
    background: linear-gradient(135deg, #1A1A1A, #1F1800);
  }

  .service-card.featured::before {
    opacity: 1;
  }

  .featured-badge {
    position: absolute;
    top: 12px;
    right: 12px;
    background: var(--gold);
    color: #000;
    font-size: 10px;
    font-weight: 800;
    padding: 3px 10px;
    border-radius: 50px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .service-icon {
    font-size: 48px;
    display: block;
    margin-bottom: 20px;
    line-height: 1;
  }

  .service-name {
    font-size: 18px;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 10px;
  }

  .service-desc {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.6;
    margin-bottom: 24px;
  }

  .service-price {
    font-size: 32px;
    font-weight: 900;
    color: var(--gold);
    line-height: 1;
  }

  .service-price span {
    font-size: 16px;
    font-weight: 500;
    color: var(--text-secondary);
    vertical-align: top;
    margin-top: 4px;
    display: inline-block;
  }

  .service-cta {
    display: block;
    margin-top: 20px;
    background: rgba(245, 158, 11, 0.1);
    color: var(--gold);
    font-size: 13px;
    font-weight: 600;
    padding: 10px 20px;
    border-radius: 8px;
    text-decoration: none;
    transition: background 0.2s;
    border: 1px solid rgba(245, 158, 11, 0.2);
  }

  .service-cta:hover {
    background: rgba(245, 158, 11, 0.2);
  }

  /* ===== AVALIAÇÕES ===== */
  #avaliacoes {
    background: var(--bg-primary);
  }

  .rating-hero {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    margin-bottom: 56px;
    padding: 40px 24px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 20px;
    position: relative;
    overflow: hidden;
  }

  .rating-hero::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  @media (min-width: 600px) {
    .rating-hero {
      flex-direction: row;
      justify-content: center;
      gap: 48px;
    }
  }

  .rating-score {
    text-align: center;
  }

  .rating-number {
    font-size: 80px;
    font-weight: 900;
    color: var(--gold);
    line-height: 1;
    letter-spacing: -2px;
  }

  .rating-stars {
    font-size: 28px;
    letter-spacing: 2px;
    margin: 8px 0;
    display: block;
  }

  .rating-count {
    font-size: 14px;
    color: var(--text-secondary);
  }

  .rating-divider {
    width: 1px;
    height: 80px;
    background: var(--border);
    display: none;
  }

  @media (min-width: 600px) {
    .rating-divider {
      display: block;
    }
  }

  .rating-details {
    text-align: center;
  }

  .rating-details-title {
    font-size: 18px;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 8px;
  }

  .rating-details-sub {
    font-size: 14px;
    color: var(--text-secondary);
    margin-bottom: 16px;
  }

  .google-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    color: var(--text-secondary);
    font-size: 12px;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 50px;
  }

  .reviews-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 20px;
  }

  @media (min-width: 700px) {
    .reviews-grid {
      grid-template-columns: repeat(3, 1fr);
    }
  }

  .review-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px 24px;
    transition: all 0.3s;
    position: relative;
  }

  .review-card:hover {
    border-color: rgba(245, 158, 11, 0.3);
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }

  .review-quote {
    position: absolute;
    top: 20px;
    right: 20px;
    font-size: 40px;
    color: rgba(245, 158, 11, 0.15);
    line-height: 1;
    font-family: Georgia, serif;
  }

  .review-stars {
    font-size: 16px;
    letter-spacing: 2px;
    margin-bottom: 14px;
    display: block;
  }

  .review-text {
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.7;
    margin-bottom: 20px;
  }

  .review-author {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .review-avatar {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: 700;
    color: #000;
    flex-shrink: 0;
  }

  .review-name {
    font-size: 14px;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 2px;
  }

  .review-date {
    font-size: 12px;
    color: var(--text-secondary);
  }

  /* ===== CONTATO ===== */
  #contato {
    background: var(--bg-secondary);
  }

  .contact-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 32px;
  }

  @media (min-width: 768px) {
    .contact-grid {
      grid-template-columns: repeat(3, 1fr);
    }
  }

  .contact-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px 24px;
    text-align: center;
    transition: all 0.3s;
  }

  .contact-card:hover {
    border-color: rgba(245, 158, 11, 0.3);
    transform: translateY(-2px);
  }

  .contact-icon {
    font-size: 40px;
    display: block;
    margin-bottom: 16px;
  }

  .contact-card-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--gold);
    margin-bottom: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-size: 13px;
  }

  .contact-info {
    font-size: 15px;
    color: var(--text-secondary);
    line-height: 1.8;
  }

  .contact-info a {
    color: var(--text-primary);
    text-decoration: none;
    font-weight: 600;
    transition: color 0.2s;
  }

  .contact-info a:hover {
    color: var(--gold);
  }

  .hours-list {
    list-style: none;
    text-align: left;
    margin-top: 4px;
  }

  .hours-list li {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    font-size: 14px;
  }

  .hours-list li:last-child {
    border-bottom: none;
  }

  .hours-list .day {
    color: var(--text-secondary);
    font-weight: 500;
  }

  .hours-list .time {
    color: var(--text-primary);
    font-weight: 600;
  }

  .hours-list .closed {
    color: #EF4444;
  }

  .contact-cta {
    margin-top: 48px;
    background: linear-gradient(135deg, #0F1A0F, #0A150A);
    border: 1px solid rgba(37, 211, 102, 0.2);
    border-radius: 20px;
    padding: 40px 24px;
    text-align: center;
  }

  .contact-cta h3 {
    font-size: 24px;
    font-weight: 800;
    color: var(--text-primary);
    margin-bottom: 12px;
  }

  .contact-cta p {
    font-size: 15px;
    color: var(--text-secondary);
    margin-bottom: 28px;
    max-width: 440px;
    margin-left: auto;
    margin-right: auto;
  }

  /* ===== FLOATING WHATSAPP ===== */
  .whatsapp-float {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 9999;
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--whatsapp);
    color: #fff;
    font-size: 14px;
    font-weight: 700;
    padding: 14px 20px 14px 16px;
    border-radius: 50px;
    text-decoration: none;
    box-shadow: 0 4px 24px rgba(37, 211, 102, 0.4);
    transition: all 0.3s;
    animation: pulse-green 2.5s infinite;
  }

  .whatsapp-float:hover {
    background: var(--whatsapp-dark);
    transform: translateY(-2px) scale(1.02);
    box-shadow: 0 8px 32px rgba(37, 211, 102, 0.5);
    animation: none;
  }

  .whatsapp-float-icon {
    font-size: 22px;
    line-height: 1;
  }

  .whatsapp-float-text {
    display: none;
  }

  @media (min-width: 480px) {
    .whatsapp-float-text {
      display: block;
    }
  }

  @keyframes pulse-green {
    0% { box-shadow: 0 4px 24px rgba(37, 211, 102, 0.4); }
    50% { box-shadow: 0 4px 40px rgba(37, 211, 102, 0.7); }
    100% { box-shadow: 0 4px 24px rgba(37, 211, 102, 0.4); }
  }

  /* ===== FOOTER ===== */
  footer {
    background: #050505;
    border-top: 1px solid var(--border);
    padding: 40px 16px;
    text-align: center;
  }

  .footer-inner {
    max-width: 1200px;
    margin: 0 auto;
  }

  .footer-logo {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 16px;
  }

  .footer-logo-text {
    font-size: 20px;
    font-weight: 700;
    color: var(--gold);
  }

  .footer-tagline {
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 24px;
  }

  .footer-divider {
    width: 40px;
    height: 1px;
    background: var(--border);
    margin: 0 auto 20px;
  }

  .footer-copy {
    font-size: 12px;
    color: #4B5563;
  }

  /* ===== RESPONSIVE HEADER ===== */
  @media (max-width: 768px) {
    nav {
      display: none;
    }
    .hamburger {
      display: flex;
    }
  }

  /* ===== UTILITIES ===== */
  .text-gold { color: var(--gold); }

  .scroll-indicator {
    position: absolute;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    color: var(--text-secondary);
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
    animation: bounce 2s infinite;
    z-index: 2;
  }

  .scroll-arrow {
    width: 20px;
    height: 20px;
