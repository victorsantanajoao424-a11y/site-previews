<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Barbearia Tarantino - São Paulo Zona Sul. Cortes masculinos, barba e muito mais. Agende pelo WhatsApp!">
<title>Barbearia Tarantino | São Paulo Zona Sul</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-main: #0A0A0A;
    --bg-alt: #111111;
    --bg-card: #1A1A1A;
    --gold: #F59E0B;
    --gold-dark: #D97706;
    --gold-light: #FCD34D;
    --green-wa: #25D366;
    --green-wa-dark: #1DA851;
    --text-main: #FFFFFF;
    --text-sec: #9CA3AF;
    --border: #2A2A2A;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: var(--font);
    background: var(--bg-main);
    color: var(--text-main);
    line-height: 1.6;
    overflow-x: hidden;
  }

  /* ===== SCROLLBAR ===== */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg-main); }
  ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 3px; }

  /* ===== HEADER ===== */
  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 1000;
    background: rgba(10,10,10,0.95);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 1rem;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .header-logo {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    text-decoration: none;
  }

  .header-logo .logo-icon {
    font-size: 1.5rem;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 40px;
    height: 40px;
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    border-radius: 8px;
    flex-shrink: 0;
  }

  .header-logo .logo-text {
    display: flex;
    flex-direction: column;
    line-height: 1.1;
  }

  .header-logo .logo-name {
    font-size: 1rem;
    font-weight: 800;
    color: var(--gold);
    letter-spacing: 0.5px;
    white-space: nowrap;
  }

  .header-logo .logo-sub {
    font-size: 0.65rem;
    color: var(--text-sec);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    white-space: nowrap;
  }

  nav { display: flex; align-items: center; gap: 0.25rem; }

  nav a {
    color: var(--text-sec);
    text-decoration: none;
    font-size: 0.8rem;
    font-weight: 500;
    padding: 0.4rem 0.6rem;
    border-radius: 6px;
    transition: color 0.2s, background 0.2s;
    white-space: nowrap;
  }

  nav a:hover { color: var(--gold); background: rgba(245,158,11,0.08); }

  .nav-cta {
    background: linear-gradient(135deg, var(--green-wa), var(--green-wa-dark)) !important;
    color: #fff !important;
    padding: 0.4rem 0.9rem !important;
    border-radius: 20px !important;
    font-weight: 700 !important;
    font-size: 0.78rem !important;
    display: flex;
    align-items: center;
    gap: 0.3rem;
    transition: transform 0.2s, box-shadow 0.2s !important;
  }

  .nav-cta:hover {
    transform: translateY(-1px) !important;
    box-shadow: 0 4px 15px rgba(37,211,102,0.4) !important;
    background: linear-gradient(135deg, var(--green-wa-dark), var(--green-wa)) !important;
  }

  .hamburger {
    display: none;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
    padding: 6px;
    border: none;
    background: transparent;
  }

  .hamburger span {
    display: block;
    width: 22px;
    height: 2px;
    background: var(--text-main);
    border-radius: 2px;
    transition: all 0.3s;
  }

  .mobile-menu {
    display: none;
    position: fixed;
    top: 64px; left: 0; right: 0;
    background: rgba(10,10,10,0.98);
    border-bottom: 1px solid var(--border);
    padding: 1rem;
    z-index: 999;
    flex-direction: column;
    gap: 0.5rem;
  }

  .mobile-menu.open { display: flex; }

  .mobile-menu a {
    color: var(--text-sec);
    text-decoration: none;
    font-size: 0.95rem;
    font-weight: 500;
    padding: 0.75rem 1rem;
    border-radius: 8px;
    transition: color 0.2s, background 0.2s;
    border-bottom: 1px solid var(--border);
  }

  .mobile-menu a:last-child { border-bottom: none; }
  .mobile-menu a:hover { color: var(--gold); background: rgba(245,158,11,0.08); }

  .mobile-menu .nav-cta {
    background: linear-gradient(135deg, var(--green-wa), var(--green-wa-dark)) !important;
    color: #fff !important;
    text-align: center;
    justify-content: center;
    border-bottom: none !important;
    font-weight: 700 !important;
  }

  /* ===== HERO ===== */
  #hero {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    padding: 7rem 1.5rem 4rem;
    background: var(--bg-main);
  }

  .hero-bg {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 0%, rgba(245,158,11,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 80% 80%, rgba(245,158,11,0.06) 0%, transparent 50%),
      radial-gradient(ellipse 40% 40% at 10% 90%, rgba(37,211,102,0.04) 0%, transparent 50%);
  }

  .hero-lines {
    position: absolute;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
  }

  .hero-line {
    position: absolute;
    background: linear-gradient(90deg, transparent, rgba(245,158,11,0.15), transparent);
    height: 1px;
    width: 100%;
    animation: lineScan 6s ease-in-out infinite;
  }

  .hero-line:nth-child(1) { top: 25%; animation-delay: 0s; }
  .hero-line:nth-child(2) { top: 55%; animation-delay: 2s; opacity: 0.5; }
  .hero-line:nth-child(3) { top: 80%; animation-delay: 4s; opacity: 0.3; }

  @keyframes lineScan {
    0%, 100% { opacity: 0; transform: scaleX(0); }
    50% { opacity: 1; transform: scaleX(1); }
  }

  .hero-deco {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
  }

  .hero-deco-1 {
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(245,158,11,0.08), transparent);
    top: -100px; right: -100px;
    animation: float 8s ease-in-out infinite;
  }

  .hero-deco-2 {
    width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(37,211,102,0.05), transparent);
    bottom: 0; left: -50px;
    animation: float 10s ease-in-out infinite reverse;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-20px) scale(1.05); }
  }

  .hero-content {
    position: relative;
    z-index: 2;
    text-align: center;
    max-width: 700px;
    width: 100%;
  }

  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    background: rgba(245,158,11,0.1);
    border: 1px solid rgba(245,158,11,0.3);
    color: var(--gold);
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 0.4rem 1rem;
    border-radius: 20px;
    margin-bottom: 1.5rem;
    animation: fadeInDown 0.8s ease forwards;
  }

  .hero-badge::before {
    content: '';
    width: 6px; height: 6px;
    background: var(--gold);
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  .hero-title {
    font-size: clamp(2.2rem, 8vw, 4rem);
    font-weight: 900;
    line-height: 1.05;
    letter-spacing: -1px;
    margin-bottom: 0.5rem;
    animation: fadeInUp 0.8s ease 0.2s both;
  }

  .hero-title span {
    background: linear-gradient(135deg, var(--gold-light), var(--gold), var(--gold-dark));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .hero-city {
    font-size: clamp(0.8rem, 2.5vw, 1rem);
    color: var(--text-sec);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 1.25rem;
    animation: fadeInUp 0.8s ease 0.35s both;
  }

  .hero-subtitle {
    font-size: clamp(1rem, 3vw, 1.3rem);
    color: #D1D5DB;
    font-weight: 400;
    margin-bottom: 0.75rem;
    line-height: 1.5;
    animation: fadeInUp 0.8s ease 0.45s both;
  }

  .hero-stars {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.4rem;
    margin-bottom: 2rem;
    animation: fadeInUp 0.8s ease 0.55s both;
    font-size: 0.85rem;
    color: var(--text-sec);
  }

  .hero-stars .stars { font-size: 0.9rem; letter-spacing: 1px; }
  .hero-stars strong { color: var(--gold); font-size: 0.95rem; }

  .hero-buttons {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    align-items: center;
    animation: fadeInUp 0.8s ease 0.65s both;
  }

  .btn-primary {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    background: linear-gradient(135deg, var(--green-wa), var(--green-wa-dark));
    color: #fff;
    text-decoration: none;
    font-weight: 800;
    font-size: 1.05rem;
    padding: 1rem 2.2rem;
    border-radius: 50px;
    width: 100%;
    max-width: 320px;
    box-shadow: 0 0 30px rgba(37,211,102,0.35);
    transition: transform 0.2s, box-shadow 0.2s;
    position: relative;
    overflow: hidden;
  }

  .btn-primary::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
    transition: left 0.5s;
  }

  .btn-primary:hover::before { left: 100%; }
  .btn-primary:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 30px rgba(37,211,102,0.55);
  }

  .btn-secondary {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    background: transparent;
    color: var(--gold);
    text-decoration: none;
    font-weight: 600;
    font-size: 0.9rem;
    padding: 0.75rem 1.5rem;
    border-radius: 50px;
    border: 1.5px solid rgba(245,158,11,0.4);
    transition: background 0.2s, border-color 0.2s, transform 0.2s;
  }

  .btn-secondary:hover {
    background: rgba(245,158,11,0.08);
    border-color: var(--gold);
    transform: translateY(-1px);
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(25px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeInDown {
    from { opacity: 0; transform: translateY(-15px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ===== SECTION BASE ===== */
  section { padding: 5rem 1.5rem; }

  .section-label {
    display: inline-block;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 0.75rem;
  }

  .section-title {
    font-size: clamp(1.6rem, 5vw, 2.4rem);
    font-weight: 800;
    line-height: 1.2;
    margin-bottom: 0.75rem;
    letter-spacing: -0.5px;
  }

  .section-desc {
    color: var(--text-sec);
    font-size: 0.95rem;
    max-width: 520px;
  }

  .section-header { margin-bottom: 3rem; }

  .section-header.center {
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ===== DIVIDER ===== */
  .gold-divider {
    width: 50px;
    height: 3px;
    background: linear-gradient(90deg, var(--gold), var(--gold-dark));
    border-radius: 2px;
    margin: 1rem 0 0;
  }

  .section-header.center .gold-divider { margin: 1rem auto 0; }

  /* ===== SERVICES ===== */
  #servicos { background: var(--bg-alt); }

  .services-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 1.25rem;
    max-width: 900px;
    margin: 0 auto;
  }

  .service-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.75rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 1.25rem;
    position: relative;
    overflow: hidden;
    transition: transform 0.3s, border-color 0.3s, box-shadow 0.3s;
    cursor: default;
  }

  .service-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 4px; height: 100%;
    background: linear-gradient(180deg, var(--gold), var(--gold-dark));
    border-radius: 0 2px 2px 0;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .service-card:hover {
    transform: translateY(-4px);
    border-color: rgba(245,158,11,0.3);
    box-shadow: 0 12px 35px rgba(0,0,0,0.4), 0 0 0 1px rgba(245,158,11,0.1);
  }

  .service-card:hover::before { opacity: 1; }

  .service-icon {
    width: 60px;
    height: 60px;
    background: linear-gradient(135deg, rgba(245,158,11,0.15), rgba(245,158,11,0.05));
    border: 1px solid rgba(245,158,11,0.2);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.7rem;
    flex-shrink: 0;
    transition: transform 0.3s;
  }

  .service-card:hover .service-icon { transform: scale(1.1) rotate(-5deg); }

  .service-info { flex: 1; }

  .service-name {
    font-size: 1rem;
    font-weight: 700;
    color: var(--text-main);
    margin-bottom: 0.25rem;
  }

  .service-desc {
    font-size: 0.82rem;
    color: var(--text-sec);
    line-height: 1.4;
  }

  .service-price {
    text-align: right;
    flex-shrink: 0;
  }

  .price-value {
    font-size: 1.4rem;
    font-weight: 900;
    color: var(--gold);
    line-height: 1;
  }

  .price-label {
    font-size: 0.7rem;
    color: var(--text-sec);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .services-cta {
    text-align: center;
    margin-top: 2.5rem;
  }

  /* ===== REVIEWS ===== */
  #avaliacoes { background: var(--bg-main); }

  .rating-hero {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 3rem;
    padding: 2.5rem 1.5rem;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 20px;
    max-width: 480px;
    margin-left: auto;
    margin-right: auto;
    margin-bottom: 3rem;
    position: relative;
    overflow: hidden;
  }

  .rating-hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at top, rgba(245,158,11,0.08), transparent 60%);
    pointer-events: none;
  }

  .rating-big {
    font-size: 4.5rem;
    font-weight: 900;
    color: var(--gold);
    line-height: 1;
    text-shadow: 0 0 40px rgba(245,158,11,0.4);
  }

  .rating-stars-big {
    font-size: 1.6rem;
    letter-spacing: 4px;
    filter: drop-shadow(0 0 8px rgba(245,158,11,0.5));
  }

  .rating-count {
    font-size: 0.85rem;
    color: var(--text-sec);
  }

  .rating-count strong { color: var(--text-main); }

  .google-badge {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.75rem;
    color: var(--text-sec);
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    padding: 0.35rem 0.75rem;
    border-radius: 20px;
    margin-top: 0.25rem;
  }

  .google-g {
    width: 16px; height: 16px;
    border-radius: 50%;
    background: conic-gradient(#4285F4 0deg 90deg, #EA4335 90deg 180deg, #FBBC05 180deg 270deg, #34A853 270deg 360deg);
    flex-shrink: 0;
  }

  .reviews-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 1.25rem;
    max-width: 900px;
    margin: 0 auto;
  }

  .review-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.5rem;
    position: relative;
    overflow: hidden;
    transition: transform 0.3s, border-color 0.3s;
  }

  .review-card:hover {
    transform: translateY(-3px);
    border-color: rgba(245,158,11,0.2);
  }

  .review-card::after {
    content: '"';
    position: absolute;
    bottom: -10px;
    right: 1rem;
    font-size: 5rem;
    color: rgba(245,158,11,0.07);
    font-family: Georgia, serif;
    line-height: 1;
    pointer-events: none;
  }

  .review-header {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 0.75rem;
  }

  .reviewer-avatar {
    width: 44px; height: 44px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    font-weight: 800;
    color: var(--bg-main);
    flex-shrink: 0;
  }

  .avatar-1 { background: linear-gradient(135deg, var(--gold), var(--gold-dark)); }
  .avatar-2 { background: linear-gradient(135deg, #60A5FA, #3B82F6); }
  .avatar-3 { background: linear-gradient(135deg, #34D399, #10B981); }

  .reviewer-info .reviewer-name {
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--text-main);
  }

  .reviewer-info .review-date {
    font-size: 0.75rem;
    color: var(--text-sec);
  }

  .review-stars { font-size: 0.8rem; letter-spacing: 1px; margin-bottom: 0.6rem; }

  .review-text {
    font-size: 0.88rem;
    color: #D1D5DB;
    line-height: 1.6;
  }

  /* ===== CONTACT ===== */
  #contato { background: var(--bg-alt); }

  .contact-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 1.5rem;
    max-width: 900px;
    margin: 0 auto;
  }

  .contact-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.75rem 1.5rem;
    display: flex;
    gap: 1.1rem;
    align-items: flex-start;
    transition: border-color 0.3s, transform 0.3s;
  }

  .contact-card:hover {
    border-color: rgba(245,158,11,0.25);
    transform: translateY(-2px);
  }

  .contact-card-icon {
    width: 48px; height: 48px;
    background: linear-gradient(135deg, rgba(245,158,11,0.15), rgba(245,158,11,0.05));
    border: 1px solid rgba(245,158,11,0.2);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.3rem;
    flex-shrink: 0;
  }

  .contact-card-body h3 {
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--gold);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 0.4rem;
  }

  .contact-card-body p,
  .contact-card-body a {
    font-size: 0.9rem;
    color: #D1D5DB;
    text-decoration: none;
    line-height: 1.6;
  }

  .contact-card-body a:hover { color: var(--gold); }

  .hours-grid {
    display: grid;
    gap: 0.35rem;
  }

  .hours-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.85rem;
    gap: 1rem;
  }

  .hours-row .day { color: var(--text-sec); }
  .hours-row .time { color: var(--text-main); font-weight: 600; }

  .hours-row.closed .time { color: #EF4444; }

  .hours-divider {
    height: 1px;
    background: var(--border);
    margin: 0.4rem 0;
  }

  .contact-cta {
    grid-column: 1 / -1;
    background: linear-gradient(135deg, rgba(37,211,102,0.1), rgba(37,211,102,0.05));
    border: 1px solid rgba(37,211,102,0.25);
    border-radius: 16px;
    padding: 2rem 1.5rem;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
  }

  .contact-cta h3 {
    font-size: 1.2rem;
    font-weight: 800;
    color: var(--text-main);
  }

  .contact-cta p { font-size: 0.88rem; color: var(--text-sec); max-width: 360px; }

  /* ===== FLOATING WHATSAPP ===== */
  .float-wa {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 9999;
    width: 58px;
    height: 58px;
    background: linear-gradient(135deg, var(--green-wa), var(--green-wa-dark));
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
    text-decoration: none;
    box-shadow: 0 4px 20px rgba(37,211,102,0.5), 0 0 0 0 rgba(37,211,102,0.4);
