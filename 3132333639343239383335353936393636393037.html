<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Barbearia Black Zone Consolação - São Paulo, SP. Cortes masculinos, barba e muito mais. Agende seu horário!">
<title>Barbearia Black Zone Consolação - São Paulo, SP</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-main: #0A0A0A;
    --bg-alt: #111111;
    --bg-card: #1A1A1A;
    --gold: #F59E0B;
    --gold-dark: #D97706;
    --gold-light: #FCD34D;
    --whatsapp: #25D366;
    --whatsapp-dark: #1DA851;
    --text: #FFFFFF;
    --text-secondary: #9CA3AF;
    --border: #2A2A2A;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: var(--font);
    background: var(--bg-main);
    color: var(--text);
    line-height: 1.6;
    overflow-x: hidden;
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg-main); }
  ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 3px; }

  /* HEADER */
  header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 1000;
    background: rgba(10, 10, 10, 0.95);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 1rem;
  }

  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    text-decoration: none;
  }

  .logo-icon {
    font-size: 1.6rem;
    filter: drop-shadow(0 0 8px rgba(245, 158, 11, 0.6));
  }

  .logo-text {
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 0.02em;
    line-height: 1.2;
    text-shadow: 0 0 20px rgba(245, 158, 11, 0.4);
  }

  .logo-text span {
    display: block;
    font-size: 0.65rem;
    font-weight: 400;
    color: var(--text-secondary);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  nav { display: flex; align-items: center; gap: 0.2rem; }

  nav a {
    color: var(--text-secondary);
    text-decoration: none;
    font-size: 0.82rem;
    font-weight: 500;
    padding: 0.4rem 0.7rem;
    border-radius: 6px;
    transition: all 0.2s ease;
    white-space: nowrap;
  }

  nav a:hover { color: var(--gold); background: rgba(245, 158, 11, 0.08); }

  .nav-cta {
    background: var(--whatsapp) !important;
    color: #fff !important;
    padding: 0.45rem 0.9rem !important;
    border-radius: 20px !important;
    font-weight: 600 !important;
    margin-left: 0.4rem;
    transition: background 0.2s ease !important;
  }

  .nav-cta:hover { background: var(--whatsapp-dark) !important; }

  @media (max-width: 600px) {
    nav a:not(.nav-cta) { display: none; }
    .logo-text { font-size: 0.8rem; }
  }

  /* HERO */
  #hero {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    padding: 100px 1.5rem 60px;
    background: var(--bg-main);
  }

  .hero-bg {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 0%, rgba(245, 158, 11, 0.12) 0%, transparent 70%),
      radial-gradient(ellipse 60% 40% at 80% 80%, rgba(245, 158, 11, 0.06) 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 20% 60%, rgba(37, 211, 102, 0.04) 0%, transparent 50%);
  }

  .hero-grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(245, 158, 11, 0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(245, 158, 11, 0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 20%, transparent 80%);
  }

  .hero-deco {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
  }

  .hero-deco-1 {
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(245, 158, 11, 0.15), transparent 70%);
    top: -100px; right: -100px;
  }

  .hero-deco-2 {
    width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(245, 158, 11, 0.08), transparent 70%);
    bottom: -50px; left: -50px;
  }

  .hero-content {
    position: relative;
    z-index: 2;
    text-align: center;
    max-width: 780px;
  }

  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    background: rgba(245, 158, 11, 0.1);
    border: 1px solid rgba(245, 158, 11, 0.3);
    color: var(--gold);
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.4rem 1rem;
    border-radius: 20px;
    margin-bottom: 1.5rem;
  }

  .hero-title {
    font-size: clamp(2rem, 6vw, 3.8rem);
    font-weight: 900;
    line-height: 1.1;
    margin-bottom: 0.5rem;
    letter-spacing: -0.02em;
  }

  .hero-title .highlight {
    color: var(--gold);
    text-shadow: 0 0 40px rgba(245, 158, 11, 0.5);
    display: block;
  }

  .hero-city {
    font-size: clamp(0.9rem, 2.5vw, 1.1rem);
    color: var(--text-secondary);
    margin-bottom: 1.2rem;
    letter-spacing: 0.05em;
  }

  .hero-city strong { color: var(--gold); }

  .hero-subtitle {
    font-size: clamp(1rem, 3vw, 1.3rem);
    color: var(--text-secondary);
    margin-bottom: 2.5rem;
    max-width: 560px;
    margin-left: auto;
    margin-right: auto;
    line-height: 1.7;
  }

  .hero-subtitle em {
    color: var(--text);
    font-style: normal;
    font-weight: 500;
  }

  .hero-actions {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
  }

  @media (min-width: 480px) {
    .hero-actions { flex-direction: row; justify-content: center; }
  }

  .btn-whatsapp {
    display: inline-flex;
    align-items: center;
    gap: 0.6rem;
    background: linear-gradient(135deg, var(--whatsapp), var(--whatsapp-dark));
    color: #fff;
    text-decoration: none;
    font-size: 1rem;
    font-weight: 700;
    padding: 0.9rem 2rem;
    border-radius: 50px;
    transition: all 0.3s ease;
    box-shadow: 0 4px 20px rgba(37, 211, 102, 0.35);
    letter-spacing: 0.02em;
  }

  .btn-whatsapp:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(37, 211, 102, 0.5);
    background: linear-gradient(135deg, #2de070, var(--whatsapp));
  }

  .btn-whatsapp:active { transform: translateY(0); }

  .btn-secondary {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    background: transparent;
    color: var(--gold);
    text-decoration: none;
    font-size: 0.92rem;
    font-weight: 600;
    padding: 0.85rem 1.8rem;
    border-radius: 50px;
    border: 1px solid rgba(245, 158, 11, 0.4);
    transition: all 0.3s ease;
  }

  .btn-secondary:hover {
    background: rgba(245, 158, 11, 0.1);
    border-color: var(--gold);
    transform: translateY(-2px);
  }

  .hero-stats {
    display: flex;
    justify-content: center;
    gap: 2.5rem;
    margin-top: 3.5rem;
    padding-top: 2.5rem;
    border-top: 1px solid var(--border);
  }

  .stat { text-align: center; }

  .stat-number {
    font-size: 1.8rem;
    font-weight: 900;
    color: var(--gold);
    line-height: 1;
    display: block;
  }

  .stat-label {
    font-size: 0.72rem;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-top: 0.3rem;
    display: block;
  }

  /* SECTION BASE */
  section { padding: 5rem 1.5rem; }

  .section-header {
    text-align: center;
    margin-bottom: 3.5rem;
  }

  .section-tag {
    display: inline-block;
    color: var(--gold);
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 0.8rem;
  }

  .section-title {
    font-size: clamp(1.7rem, 4vw, 2.5rem);
    font-weight: 800;
    line-height: 1.2;
    margin-bottom: 0.8rem;
    letter-spacing: -0.01em;
  }

  .section-title .gold { color: var(--gold); }

  .section-desc {
    color: var(--text-secondary);
    font-size: 1rem;
    max-width: 520px;
    margin: 0 auto;
    line-height: 1.7;
  }

  .container { max-width: 1200px; margin: 0 auto; }

  /* SERVIÇOS */
  #servicos { background: var(--bg-alt); }

  .services-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 1.2rem;
    max-width: 1100px;
    margin: 0 auto;
  }

  @media (min-width: 480px) {
    .services-grid { grid-template-columns: repeat(2, 1fr); }
  }

  @media (min-width: 900px) {
    .services-grid { grid-template-columns: repeat(4, 1fr); }
  }

  .service-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem 1.5rem;
    text-align: center;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
    cursor: default;
  }

  .service-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(245, 158, 11, 0.05), transparent);
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .service-card:hover {
    border-color: rgba(245, 158, 11, 0.4);
    transform: translateY(-4px);
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4), 0 0 20px rgba(245, 158, 11, 0.08);
  }

  .service-card:hover::before { opacity: 1; }

  .service-card.featured {
    border-color: rgba(245, 158, 11, 0.35);
    background: linear-gradient(135deg, #1E1E1E, #1A1A1A);
  }

  .service-card.featured::after {
    content: 'POPULAR';
    position: absolute;
    top: 14px;
    right: -22px;
    background: var(--gold);
    color: #000;
    font-size: 0.62rem;
    font-weight: 800;
    letter-spacing: 0.08em;
    padding: 3px 28px;
    transform: rotate(45deg);
  }

  .service-icon {
    font-size: 2.8rem;
    display: block;
    margin-bottom: 1rem;
    filter: drop-shadow(0 2px 8px rgba(245, 158, 11, 0.3));
  }

  .service-name {
    font-size: 1.05rem;
    font-weight: 700;
    margin-bottom: 0.5rem;
    color: var(--text);
  }

  .service-desc {
    font-size: 0.8rem;
    color: var(--text-secondary);
    margin-bottom: 1.2rem;
    line-height: 1.6;
  }

  .service-price {
    font-size: 1.6rem;
    font-weight: 900;
    color: var(--gold);
    line-height: 1;
  }

  .service-price span {
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--text-secondary);
  }

  .service-cta {
    display: block;
    margin-top: 1.2rem;
    padding: 0.6rem 1.2rem;
    background: transparent;
    border: 1px solid rgba(245, 158, 11, 0.3);
    color: var(--gold);
    border-radius: 30px;
    font-size: 0.8rem;
    font-weight: 600;
    text-decoration: none;
    transition: all 0.2s ease;
  }

  .service-cta:hover {
    background: rgba(245, 158, 11, 0.1);
    border-color: var(--gold);
  }

  /* AVALIAÇÕES */
  #avaliacoes { background: var(--bg-main); }

  .rating-hero {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2.5rem 2rem;
    max-width: 460px;
    margin: 0 auto 3rem;
    position: relative;
    overflow: hidden;
  }

  .rating-hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(245, 158, 11, 0.05), transparent 60%);
    pointer-events: none;
  }

  .rating-google-logo {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.8rem;
    color: var(--text-secondary);
    font-weight: 600;
    letter-spacing: 0.05em;
  }

  .google-g {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: linear-gradient(135deg, #4285F4 0%, #EA4335 25%, #FBBC05 50%, #34A853 75%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.85rem;
    font-weight: 900;
    color: white;
  }

  .rating-number {
    font-size: 4.5rem;
    font-weight: 900;
    color: var(--gold);
    line-height: 1;
    text-shadow: 0 0 40px rgba(245, 158, 11, 0.4);
  }

  .rating-stars { font-size: 1.8rem; letter-spacing: 0.1em; }

  .rating-count {
    font-size: 0.85rem;
    color: var(--text-secondary);
  }

  .reviews-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 1.2rem;
    max-width: 900px;
    margin: 0 auto;
  }

  @media (min-width: 640px) {
    .reviews-grid { grid-template-columns: repeat(2, 1fr); }
  }

  @media (min-width: 900px) {
    .reviews-grid { grid-template-columns: repeat(3, 1fr); }
  }

  .review-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.5rem;
    transition: all 0.3s ease;
    position: relative;
  }

  .review-card:hover {
    border-color: rgba(245, 158, 11, 0.3);
    transform: translateY(-3px);
    box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
  }

  .review-header {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    margin-bottom: 1rem;
  }

  .review-avatar {
    width: 44px; height: 44px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    font-weight: 700;
    flex-shrink: 0;
    color: #000;
  }

  .avatar-1 { background: linear-gradient(135deg, #F59E0B, #D97706); }
  .avatar-2 { background: linear-gradient(135deg, #3B82F6, #1D4ED8); }
  .avatar-3 { background: linear-gradient(135deg, #10B981, #059669); }

  .review-meta { flex: 1; min-width: 0; }

  .review-name {
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .review-date {
    font-size: 0.72rem;
    color: var(--text-secondary);
  }

  .review-stars { font-size: 0.85rem; margin-bottom: 0.8rem; }

  .review-text {
    font-size: 0.85rem;
    color: var(--text-secondary);
    line-height: 1.7;
    font-style: italic;
  }

  .review-quote {
    position: absolute;
    top: 1rem;
    right: 1.2rem;
    font-size: 2rem;
    color: rgba(245, 158, 11, 0.15);
    font-family: Georgia, serif;
    line-height: 1;
  }

  /* CONTATO */
  #contato { background: var(--bg-alt); }

  .contact-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 1.5rem;
    max-width: 900px;
    margin: 0 auto;
  }

  @media (min-width: 640px) {
    .contact-grid { grid-template-columns: repeat(2, 1fr); }
  }

  @media (min-width: 900px) {
    .contact-grid { grid-template-columns: repeat(3, 1fr); }
  }

  .contact-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.8rem 1.5rem;
    transition: all 0.3s ease;
  }

  .contact-card:hover {
    border-color: rgba(245, 158, 11, 0.3);
    transform: translateY(-3px);
    box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
  }

  .contact-icon {
    font-size: 2rem;
    display: block;
    margin-bottom: 0.8rem;
    filter: drop-shadow(0 2px 6px rgba(245, 158, 11, 0.3));
  }

  .contact-label {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 0.5rem;
    display: block;
  }

  .contact-value {
    font-size: 0.9rem;
    color: var(--text);
    line-height: 1.6;
    font-weight: 500;
  }

  .contact-link {
    color: var(--text);
    text-decoration: none;
    transition: color 0.2s;
  }

  .contact-link:hover { color: var(--gold); }

  .hours-list { list-style: none; }

  .hours-list li {
    display: flex;
    justify-content: space-between;
    font-size: 0.85rem;
    padding: 0.25rem 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }

  .hours-list li:last-child { border-bottom: none; }

  .hours-list .day { color: var(--text-secondary); }
  .hours-list .time { color: var(--text); font-weight: 500; }
  .hours-list .closed { color: #EF4444; }

  .contact-cta {
    max-width: 900px;
    margin: 2.5rem auto 0;
    background: linear-gradient(135deg, rgba(245, 158, 11, 0.1), rgba(245, 158, 11, 0.05));
    border: 1px solid rgba(245, 158, 11, 0.25);
    border-radius: 16px;
    padding: 2rem 1.5rem;
    text-align: center;
  }

  .contact-cta h3 {
    font-size: 1.3rem;
    font-weight: 800;
    margin-bottom: 0.5rem;
  }

  .contact-cta p {
    color: var(--text-secondary);
    font-size: 0.9rem;
    margin-bottom: 1.5rem;
  }

  /* FLOATING WHATSAPP */
  .float-wa {
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    z-index: 999;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 0.5rem;
  }

  .float-wa-tooltip {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 0.78rem;
    font-weight: 500;
    padding: 0.5rem 0.9rem;
    border-radius: 20px;
    white-space: nowrap;
    opacity: 0;
    transform: translateX(10px);
    transition: all 0.3s ease;
    pointer-events: none;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
  }

  .float-wa:hover .float-wa-tooltip {
    opacity: 1;
    transform: translateX(0);
  }

  .float-wa-btn {
    width: 58px; height: 58px;
    background: linear-gradient(135deg, var(--whatsapp), var(--whatsapp-dark));
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.6rem;
    text-decoration: none;
    box-shadow: 0 4px 20px rgba(37, 211, 102, 0.4);
    transition: all 0.3s ease;
    animation: float-pulse 3s ease-in-out infinite;
  }

  .float-wa-btn:hover {
    transform: scale(1.1);
    box-shadow: 0 6px 30px rgba(37, 211, 102, 0.6);
    animation: none;
  }

  @keyframes float-pulse {
    0%, 100% { box-shadow: 0 4px 20px rgba(37, 211, 102, 0.4); }
    50% { box-shadow: 0 4px 30px rgba(37, 211, 102, 0.7), 0 0 0 8px rgba(37, 211, 102, 0.1); }
  }

  /* FOOTER */
  footer {
    background: #050505;
    border-top: 1px solid var(--border);
    padding: 2.5rem 1.5rem;
    text-align: center;
  }

  .footer-logo {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.6rem;
    margin-bottom: 1rem;
  }

  .footer-logo-text {
    font-size: 1.1rem;
    font-weight: 800;
    color: var(--gold);
    letter-spacing: 0.02em;
  }

  .footer-divider {
    width: 60px;
    height: 2px;
    background: linear-gradient(to right, transparent, var(--gold), transparent);
    margin: 1rem auto;
  }

  .footer-links {
    display: flex;
    justify-content: center;
    gap: 1.5rem;
    flex-wrap: wrap;
    margin-bottom: 1.2rem;
  }

  .footer-links a {
    color: var(--text-secondary);
    text-decoration: none;
    font-size: 0.8rem;
    transition: color 0.2s;
  }

  .footer-links a:hover { color: var(--gold); }

  .footer-copy {
    font-size: 0.78rem;
    color: var(--text-secondary);
    line-height: 1.8;
  }

  .footer-copy strong { color: var(--gold); }

  /* ANIMATIONS */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .hero-content > * {
    animation: fadeInUp 0.6s ease both;
  }

  .hero-content > *:nth-child(1) { animation-delay: 0.1s; }
  .hero-content > *:nth-child(2) { animation-delay: 0.2s; }
  .hero-content > *:nth-child(3) { animation-delay: 0.3s; }
