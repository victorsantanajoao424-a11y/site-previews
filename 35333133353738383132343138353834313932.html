<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Vera Robalo Barbearia - São Paulo, SP. Cortes masculinos, barba e muito mais. Avaliação 5/5 no Google. Agende seu horário pelo WhatsApp!">
<title>Vera Robalo Barbearia | São Paulo - SP</title>
<style>
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  :root {
    --bg-primary: #0A0A0A;
    --bg-secondary: #111111;
    --bg-card: #1A1A1A;
    --gold: #F59E0B;
    --gold-dark: #D97706;
    --gold-light: #FCD34D;
    --green-wa: #25D366;
    --green-wa-dark: #1DA851;
    --text-primary: #FFFFFF;
    --text-secondary: #9CA3AF;
    --border: #2A2A2A;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  html {
    scroll-behavior: smooth;
  }

  body {
    background-color: var(--bg-primary);
    color: var(--text-primary);
    font-family: var(--font);
    line-height: 1.6;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 1000;
    background: rgba(10, 10, 10, 0.95);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
    padding: 0 1rem;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .header-logo {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    text-decoration: none;
  }

  .header-logo .logo-icon {
    font-size: 1.5rem;
    line-height: 1;
  }

  .header-logo .logo-text {
    font-size: 1rem;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 0.02em;
    line-height: 1.2;
  }

  .header-logo .logo-text span {
    display: block;
    font-size: 0.65rem;
    font-weight: 400;
    color: var(--text-secondary);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  nav {
    display: flex;
    align-items: center;
    gap: 0.25rem;
  }

  nav a {
    color: var(--text-secondary);
    text-decoration: none;
    font-size: 0.8rem;
    font-weight: 500;
    padding: 0.4rem 0.6rem;
    border-radius: 6px;
    transition: color 0.2s, background 0.2s;
    display: none;
  }

  nav a:hover {
    color: var(--gold);
    background: rgba(245, 158, 11, 0.08);
  }

  .nav-cta {
    background: var(--green-wa);
    color: #fff !important;
    padding: 0.45rem 0.9rem !important;
    border-radius: 20px !important;
    font-weight: 600 !important;
    font-size: 0.78rem !important;
    display: flex !important;
    align-items: center;
    gap: 0.3rem;
    transition: background 0.2s, transform 0.2s !important;
  }

  .nav-cta:hover {
    background: var(--green-wa-dark) !important;
    color: #fff !important;
    transform: translateY(-1px);
  }

  @media (min-width: 768px) {
    nav a {
      display: inline-flex;
      align-items: center;
    }
    .header-logo .logo-text {
      font-size: 1.1rem;
    }
  }

  /* HERO */
  .hero {
    min-height: 100vh;
    padding-top: 64px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    background: linear-gradient(135deg, #0A0A0A 0%, #111111 40%, #0D0D0D 100%);
  }

  .hero::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -20%;
    width: 70%;
    height: 120%;
    background: radial-gradient(ellipse, rgba(245, 158, 11, 0.07) 0%, transparent 70%);
    pointer-events: none;
  }

  .hero::after {
    content: '';
    position: absolute;
    bottom: -30%;
    right: -10%;
    width: 60%;
    height: 100%;
    background: radial-gradient(ellipse, rgba(245, 158, 11, 0.04) 0%, transparent 70%);
    pointer-events: none;
  }

  .hero-deco {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    pointer-events: none;
    overflow: hidden;
  }

  .hero-deco::before {
    content: '✂️';
    position: absolute;
    font-size: 8rem;
    opacity: 0.03;
    top: 10%;
    right: 5%;
    transform: rotate(-30deg);
  }

  .hero-deco::after {
    content: '✂️';
    position: absolute;
    font-size: 5rem;
    opacity: 0.03;
    bottom: 15%;
    left: 8%;
    transform: rotate(120deg);
  }

  .hero-content {
    text-align: center;
    padding: 3rem 1.5rem;
    max-width: 700px;
    position: relative;
    z-index: 1;
  }

  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    background: rgba(245, 158, 11, 0.1);
    border: 1px solid rgba(245, 158, 11, 0.25);
    color: var(--gold);
    font-size: 0.75rem;
    font-weight: 600;
    padding: 0.35rem 0.9rem;
    border-radius: 20px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 1.5rem;
  }

  .hero-title {
    font-size: 2.4rem;
    font-weight: 800;
    line-height: 1.15;
    margin-bottom: 0.5rem;
    letter-spacing: -0.02em;
  }

  .hero-title .gold {
    color: var(--gold);
    display: block;
  }

  .hero-city {
    font-size: 0.9rem;
    color: var(--text-secondary);
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 1.25rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.4rem;
  }

  .hero-city::before, .hero-city::after {
    content: '';
    display: inline-block;
    width: 30px;
    height: 1px;
    background: var(--border);
  }

  .hero-subtitle {
    font-size: 1.05rem;
    color: var(--text-secondary);
    line-height: 1.7;
    margin-bottom: 2rem;
    max-width: 500px;
    margin-left: auto;
    margin-right: auto;
  }

  .hero-stars {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.3rem;
    margin-bottom: 2rem;
    font-size: 0.85rem;
    color: var(--text-secondary);
  }

  .hero-stars .stars {
    color: var(--gold);
    font-size: 1rem;
    letter-spacing: 2px;
  }

  .hero-stars strong {
    color: var(--text-primary);
    font-weight: 700;
  }

  .btn-whatsapp {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0.6rem;
    background: var(--green-wa);
    color: #fff;
    text-decoration: none;
    font-size: 1rem;
    font-weight: 700;
    padding: 0.95rem 2rem;
    border-radius: 50px;
    transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 24px rgba(37, 211, 102, 0.3);
    letter-spacing: 0.02em;
  }

  .btn-whatsapp:hover {
    background: var(--green-wa-dark);
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(37, 211, 102, 0.4);
  }

  .btn-whatsapp:active {
    transform: translateY(0);
  }

  .btn-whatsapp .btn-icon {
    font-size: 1.3rem;
    line-height: 1;
  }

  .hero-scroll {
    margin-top: 3rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.4rem;
    color: var(--text-secondary);
    font-size: 0.75rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    opacity: 0.6;
  }

  .scroll-line {
    width: 1px;
    height: 40px;
    background: linear-gradient(to bottom, var(--border), transparent);
  }

  @media (min-width: 640px) {
    .hero-title {
      font-size: 3.2rem;
    }
    .hero-subtitle {
      font-size: 1.1rem;
    }
  }

  @media (min-width: 1024px) {
    .hero-title {
      font-size: 4rem;
    }
  }

  /* SECTION BASE */
  section {
    padding: 4rem 1.5rem;
  }

  .section-alt {
    background: var(--bg-secondary);
  }

  .container {
    max-width: 1100px;
    margin: 0 auto;
  }

  .section-label {
    display: inline-block;
    color: var(--gold);
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 0.75rem;
    padding: 0.25rem 0.75rem;
    background: rgba(245, 158, 11, 0.08);
    border-radius: 4px;
    border-left: 2px solid var(--gold);
  }

  .section-title {
    font-size: 1.8rem;
    font-weight: 800;
    line-height: 1.2;
    margin-bottom: 0.75rem;
    letter-spacing: -0.02em;
  }

  .section-subtitle {
    color: var(--text-secondary);
    font-size: 0.95rem;
    line-height: 1.7;
    max-width: 520px;
  }

  .section-header {
    margin-bottom: 2.5rem;
  }

  @media (min-width: 768px) {
    section {
      padding: 5rem 2rem;
    }
    .section-title {
      font-size: 2.2rem;
    }
  }

  /* SERVIÇOS */
  .services-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 1rem;
  }

  @media (min-width: 480px) {
    .services-grid {
      grid-template-columns: 1fr 1fr;
    }
  }

  @media (min-width: 900px) {
    .services-grid {
      grid-template-columns: repeat(4, 1fr);
    }
  }

  .service-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.75rem 1.5rem;
    transition: border-color 0.3s, transform 0.3s, box-shadow 0.3s;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }

  .service-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--gold), var(--gold-dark));
    opacity: 0;
    transition: opacity 0.3s;
  }

  .service-card:hover {
    border-color: rgba(245, 158, 11, 0.3);
    transform: translateY(-4px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.4);
  }

  .service-card:hover::before {
    opacity: 1;
  }

  .service-icon {
    font-size: 2.2rem;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 56px;
    height: 56px;
    background: rgba(245, 158, 11, 0.08);
    border-radius: 12px;
    border: 1px solid rgba(245, 158, 11, 0.12);
  }

  .service-name {
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--text-primary);
    line-height: 1.3;
  }

  .service-desc {
    font-size: 0.82rem;
    color: var(--text-secondary);
    line-height: 1.6;
    flex: 1;
  }

  .service-price {
    display: inline-flex;
    align-items: baseline;
    gap: 0.2rem;
    margin-top: 0.25rem;
  }

  .service-price .currency {
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--gold);
  }

  .service-price .amount {
    font-size: 1.7rem;
    font-weight: 800;
    color: var(--gold);
    line-height: 1;
  }

  .service-cta {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.4rem;
    background: rgba(37, 211, 102, 0.1);
    border: 1px solid rgba(37, 211, 102, 0.2);
    color: var(--green-wa);
    text-decoration: none;
    font-size: 0.82rem;
    font-weight: 600;
    padding: 0.6rem 1rem;
    border-radius: 8px;
    transition: background 0.2s, border-color 0.2s;
    margin-top: 0.5rem;
  }

  .service-cta:hover {
    background: rgba(37, 211, 102, 0.18);
    border-color: rgba(37, 211, 102, 0.35);
  }

  /* AVALIAÇÕES */
  .rating-hero {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
    padding: 2rem;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 20px;
    margin-bottom: 2.5rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .rating-hero::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--gold-dark), var(--gold), var(--gold-light), var(--gold), var(--gold-dark));
  }

  .rating-number {
    font-size: 4rem;
    font-weight: 800;
    color: var(--gold);
    line-height: 1;
    letter-spacing: -0.04em;
  }

  .rating-stars-big {
    font-size: 1.8rem;
    letter-spacing: 4px;
    color: var(--gold);
  }

  .rating-label {
    font-size: 0.85rem;
    color: var(--text-secondary);
    font-weight: 500;
  }

  .rating-label strong {
    color: var(--text-primary);
  }

  .google-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.78rem;
    color: var(--text-secondary);
    margin-top: 0.25rem;
  }

  .google-badge .g-dot {
    display: inline-flex;
    gap: 1px;
  }

  .google-badge .g-dot span {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  .g-blue { background: #4285F4; }
  .g-red { background: #EA4335; }
  .g-yellow { background: #FBBC05; }
  .g-green { background: #34A853; }

  .reviews-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 1rem;
  }

  @media (min-width: 640px) {
    .reviews-grid {
      grid-template-columns: 1fr 1fr;
    }
  }

  @media (min-width: 900px) {
    .reviews-grid {
      grid-template-columns: repeat(3, 1fr);
    }
    .rating-hero {
      flex-direction: row;
      justify-content: center;
      gap: 3rem;
      text-align: left;
    }
    .rating-hero .rating-center {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
  }

  .review-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    transition: border-color 0.3s, transform 0.3s;
  }

  .review-card:hover {
    border-color: rgba(245, 158, 11, 0.2);
    transform: translateY(-2px);
  }

  .review-header {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .review-avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    font-weight: 700;
    color: #fff;
    flex-shrink: 0;
    font-style: normal;
  }

  .av1 { background: linear-gradient(135deg, #667eea, #764ba2); }
  .av2 { background: linear-gradient(135deg, #f093fb, #f5576c); }
  .av3 { background: linear-gradient(135deg, #4facfe, #00f2fe); }

  .review-meta {
    flex: 1;
  }

  .review-name {
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--text-primary);
    line-height: 1.2;
  }

  .review-date {
    font-size: 0.72rem;
    color: var(--text-secondary);
  }

  .review-stars {
    color: var(--gold);
    font-size: 0.75rem;
    letter-spacing: 1px;
  }

  .review-text {
    font-size: 0.87rem;
    color: var(--text-secondary);
    line-height: 1.7;
    font-style: italic;
  }

  .review-text::before {
    content: '"';
    font-size: 1.5rem;
    color: var(--gold);
    opacity: 0.4;
    line-height: 0;
    vertical-align: -0.4em;
    margin-right: 2px;
  }

  /* CONTATO */
  .contact-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 1.5rem;
  }

  @media (min-width: 768px) {
    .contact-grid {
      grid-template-columns: 1fr 1fr;
    }
  }

  @media (min-width: 1024px) {
    .contact-grid {
      grid-template-columns: 1fr 1fr 1fr;
    }
  }

  .contact-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.75rem 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    transition: border-color 0.3s;
  }

  .contact-card:hover {
    border-color: rgba(245, 158, 11, 0.25);
  }

  .contact-icon {
    font-size: 1.8rem;
    width: 52px;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(245, 158, 11, 0.08);
    border-radius: 12px;
    border: 1px solid rgba(245, 158, 11, 0.12);
    line-height: 1;
  }

  .contact-card-label {
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gold);
  }

  .contact-card-value {
    font-size: 0.92rem;
    color: var(--text-primary);
    font-weight: 500;
    line-height: 1.5;
  }

  .contact-card-value a {
    color: var(--text-primary);
    text-decoration: none;
    transition: color 0.2s;
  }

  .contact-card-value a:hover {
    color: var(--gold);
  }

  .hours-list {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }

  .hours-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.87rem;
    padding: 0.3rem 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }

  .hours-item:last-child {
    border-bottom: none;
  }

  .hours-day {
    color: var(--text-secondary);
    font-size: 0.82rem;
  }

  .hours-time {
    color: var(--text-primary);
    font-weight: 600;
    font-size: 0.82rem;
  }

  .hours-closed {
    color: #ef4444;
    font-weight: 600;
    font-size: 0.82rem;
  }

  .open-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
    background: rgba(37, 211, 102, 0.1);
    border: 1px solid rgba(37, 211, 102, 0.2);
    color: var(--green-wa);
    font-size: 0.72rem;
    font-weight: 700;
    padding: 0.2rem 0.6rem;
    border-radius: 20px;
    margin-top: 0.25rem;
    width: fit-content;
    letter-spacing: 0.05em;
  }

  .open-badge::before {
    content: '';
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green-wa);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  /* CTA FINAL */
  .cta-section {
    background: linear-gradient(135deg, #111111 0%, #0D0D0D 100%);
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .cta-section::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 600px;
    height: 300px;
    background: radial-gradient(ellipse, rgba(245, 158, 11, 0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  .cta-content {
    position: relative;
    z-index: 1;
    max-width: 560px;
    margin: 0 auto;
  }

  .cta-content .section-title {
    margin-bottom: 1rem;
  }

  .cta-content .section-subtitle {
    max-width: 100%;
    margin-bottom: 2rem;
  }

  .cta-note {
    margin-top: 1rem;
    font-size: 0.78rem;
    color: var(--text-secondary);
  }

  /* FLOATING WHATSAPP */
  .float-wa {
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    z-index: 999;
    width: 58px;
    height: 58px;
    background: var(--green-wa);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.6rem;
    text-decoration: none;
    box-shadow: 0 4px 20px rgba(37, 211, 102, 0.45);
    transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
    line-height: 1;
  }

  .float-wa:hover {
    background: var(--green-wa-dark);
    transform: scale(1.1) translateY(-2px);
    box-shadow: 0 8px 32px rgba(37, 211, 102, 0.55);
  }

  .float-wa::before {
    content: '';
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: rgba(37, 211, 102, 0.3);
    animation: ripple 2.5s infinite;
  }

  @keyframes ripple {
    0% { transform: scale(1); opacity: 0.7; }
    100% { transform: scale(1.8); opacity: 0; }
  }

  .float-wa-tooltip {
    position: absolute;
    right: calc(100% + 12px);
    top: 50%;
    transform: translateY(-50%);
    background: #1A1A1A;
    border: 1px solid var(--border);
    color: var(--text-primary);
    font-size: 0.75rem;
    font-weight: 600;
    padding: 0.4rem 0.75rem;
    border-radius: 8px;
