<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Barbearia Retrô Gol - A melhor barbearia de São Paulo. Cortes masculinos, barba e muito mais. Agende pelo WhatsApp!">
<title>Barbearia Retrô Gol | São Paulo</title>
<style>
  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --bg-primary: #0A0A0A;
    --bg-secondary: #111111;
    --bg-card: #1A1A1A;
    --gold: #F59E0B;
    --gold-light: #FCD34D;
    --gold-dark: #D97706;
    --whatsapp: #25D366;
    --whatsapp-dark: #1DA851;
    --text-primary: #FFFFFF;
    --text-secondary: #9CA3AF;
    --border: #2A2A2A;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  html {
    scroll-behavior: smooth;
  }

  body {
    font-family: var(--font);
    background-color: var(--bg-primary);
    color: var(--text-primary);
    line-height: 1.6;
    overflow-x: hidden;
  }

  /* ===== SCROLLBAR ===== */
  ::-webkit-scrollbar {
    width: 6px;
  }
  ::-webkit-scrollbar-track {
    background: var(--bg-primary);
  }
  ::-webkit-scrollbar-thumb {
    background: var(--gold);
    border-radius: 3px;
  }

  /* ===== HEADER ===== */
  header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 1000;
    background: rgba(10, 10, 10, 0.95);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
    padding: 0 16px;
  }

  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
  }

  .logo-icon {
    width: 40px;
    height: 40px;
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .logo-text {
    display: flex;
    flex-direction: column;
    line-height: 1.1;
  }

  .logo-name {
    font-size: 14px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .logo-sub {
    font-size: 10px;
    color: var(--text-secondary);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  nav {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  nav a {
    color: var(--text-secondary);
    text-decoration: none;
    font-size: 13px;
    font-weight: 500;
    padding: 6px 12px;
    border-radius: 6px;
    transition: color 0.2s, background 0.2s;
    display: none;
  }

  nav a:hover {
    color: var(--gold);
    background: rgba(245, 158, 11, 0.08);
  }

  @media (min-width: 640px) {
    nav a {
      display: block;
    }
  }

  .nav-cta {
    background: linear-gradient(135deg, var(--whatsapp), var(--whatsapp-dark));
    color: #fff !important;
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    text-decoration: none;
    display: flex !important;
    align-items: center;
    gap: 6px;
    transition: opacity 0.2s, transform 0.2s;
  }

  .nav-cta:hover {
    opacity: 0.9;
    transform: translateY(-1px);
    background: linear-gradient(135deg, var(--whatsapp), var(--whatsapp-dark)) !important;
  }

  /* ===== HERO ===== */
  #hero {
    min-height: 100vh;
    background: linear-gradient(135deg, #0A0A0A 0%, #0f0f0f 40%, #1a1200 70%, #0A0A0A 100%);
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 100px 20px 60px;
    overflow: hidden;
  }

  .hero-bg-circle1 {
    position: absolute;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(245, 158, 11, 0.12) 0%, transparent 70%);
    top: -100px;
    right: -100px;
    pointer-events: none;
  }

  .hero-bg-circle2 {
    position: absolute;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(245, 158, 11, 0.06) 0%, transparent 70%);
    bottom: -80px;
    left: -80px;
    pointer-events: none;
  }

  .hero-bg-lines {
    position: absolute;
    inset: 0;
    background-image: 
      linear-gradient(rgba(245, 158, 11, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(245, 158, 11, 0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
  }

  .hero-content {
    position: relative;
    z-index: 1;
    max-width: 700px;
    margin: 0 auto;
  }

  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(245, 158, 11, 0.1);
    border: 1px solid rgba(245, 158, 11, 0.3);
    color: var(--gold);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 6px 16px;
    border-radius: 20px;
    margin-bottom: 24px;
  }

  .hero-title {
    font-size: clamp(32px, 8vw, 64px);
    font-weight: 800;
    line-height: 1.05;
    margin-bottom: 8px;
    letter-spacing: -1px;
  }

  .hero-title .gold {
    color: var(--gold);
    display: block;
  }

  .hero-city {
    font-size: clamp(13px, 3vw, 16px);
    color: var(--text-secondary);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 20px;
    font-weight: 500;
  }

  .hero-subtitle {
    font-size: clamp(15px, 3.5vw, 20px);
    color: var(--text-secondary);
    margin-bottom: 36px;
    max-width: 480px;
    margin-left: auto;
    margin-right: auto;
    line-height: 1.7;
  }

  .hero-subtitle strong {
    color: var(--text-primary);
  }

  .hero-buttons {
    display: flex;
    flex-direction: column;
    gap: 12px;
    align-items: center;
  }

  @media (min-width: 480px) {
    .hero-buttons {
      flex-direction: row;
      justify-content: center;
    }
  }

  .btn-whatsapp {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: linear-gradient(135deg, var(--whatsapp), var(--whatsapp-dark));
    color: #fff;
    text-decoration: none;
    font-size: 16px;
    font-weight: 700;
    padding: 16px 28px;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(37, 211, 102, 0.3);
    transition: transform 0.2s, box-shadow 0.2s;
    white-space: nowrap;
  }

  .btn-whatsapp:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(37, 211, 102, 0.45);
  }

  .btn-secondary {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: transparent;
    color: var(--gold);
    text-decoration: none;
    font-size: 14px;
    font-weight: 600;
    padding: 14px 24px;
    border-radius: 12px;
    border: 1px solid rgba(245, 158, 11, 0.4);
    transition: background 0.2s, border-color 0.2s;
    white-space: nowrap;
  }

  .btn-secondary:hover {
    background: rgba(245, 158, 11, 0.08);
    border-color: var(--gold);
  }

  .hero-stats {
    display: flex;
    justify-content: center;
    gap: 32px;
    margin-top: 48px;
    padding-top: 32px;
    border-top: 1px solid var(--border);
    flex-wrap: wrap;
  }

  .hero-stat {
    text-align: center;
  }

  .hero-stat-number {
    font-size: 28px;
    font-weight: 800;
    color: var(--gold);
    display: block;
    line-height: 1;
    margin-bottom: 4px;
  }

  .hero-stat-label {
    font-size: 11px;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* ===== SECTIONS COMMON ===== */
  section {
    padding: 72px 20px;
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
  }

  .section-header {
    text-align: center;
    margin-bottom: 48px;
  }

  .section-tag {
    display: inline-block;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 12px;
    padding: 4px 12px;
    background: rgba(245, 158, 11, 0.1);
    border-radius: 4px;
  }

  .section-title {
    font-size: clamp(24px, 5vw, 38px);
    font-weight: 800;
    line-height: 1.2;
    margin-bottom: 12px;
    letter-spacing: -0.5px;
  }

  .section-desc {
    font-size: 15px;
    color: var(--text-secondary);
    max-width: 480px;
    margin: 0 auto;
    line-height: 1.7;
  }

  .gold-line {
    width: 48px;
    height: 3px;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    border-radius: 2px;
    margin: 16px auto 0;
  }

  /* ===== SERVICES ===== */
  #servicos {
    background: var(--bg-secondary);
  }

  .services-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 20px;
  }

  @media (min-width: 480px) {
    .services-grid {
      grid-template-columns: repeat(2, 1fr);
    }
  }

  @media (min-width: 900px) {
    .services-grid {
      grid-template-columns: repeat(4, 1fr);
    }
  }

  .service-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px 24px;
    text-align: center;
    transition: transform 0.3s, border-color 0.3s, box-shadow 0.3s;
    position: relative;
    overflow: hidden;
  }

  .service-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    opacity: 0;
    transition: opacity 0.3s;
  }

  .service-card:hover {
    transform: translateY(-6px);
    border-color: rgba(245, 158, 11, 0.4);
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(245, 158, 11, 0.1);
  }

  .service-card:hover::before {
    opacity: 1;
  }

  .service-icon {
    width: 64px;
    height: 64px;
    background: linear-gradient(135deg, rgba(245, 158, 11, 0.15), rgba(245, 158, 11, 0.05));
    border: 1px solid rgba(245, 158, 11, 0.2);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    margin: 0 auto 20px;
    transition: background 0.3s;
  }

  .service-card:hover .service-icon {
    background: linear-gradient(135deg, rgba(245, 158, 11, 0.25), rgba(245, 158, 11, 0.1));
  }

  .service-name {
    font-size: 17px;
    font-weight: 700;
    margin-bottom: 8px;
    color: var(--text-primary);
  }

  .service-desc {
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 20px;
    line-height: 1.6;
  }

  .service-price {
    font-size: 28px;
    font-weight: 800;
    color: var(--gold);
    display: block;
    margin-bottom: 4px;
    line-height: 1;
  }

  .service-price-label {
    font-size: 11px;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .service-cta {
    display: block;
    margin-top: 20px;
    background: rgba(245, 158, 11, 0.1);
    color: var(--gold);
    text-decoration: none;
    font-size: 13px;
    font-weight: 600;
    padding: 10px 16px;
    border-radius: 8px;
    border: 1px solid rgba(245, 158, 11, 0.2);
    transition: background 0.2s, border-color 0.2s;
  }

  .service-cta:hover {
    background: rgba(245, 158, 11, 0.2);
    border-color: rgba(245, 158, 11, 0.5);
  }

  /* ===== REVIEWS ===== */
  #avaliacoes {
    background: var(--bg-primary);
  }

  .rating-hero {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    margin-bottom: 48px;
    padding: 36px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 20px;
    max-width: 600px;
    margin-left: auto;
    margin-right: auto;
  }

  @media (min-width: 600px) {
    .rating-hero {
      flex-direction: row;
      text-align: left;
    }
  }

  .rating-score {
    text-align: center;
    flex-shrink: 0;
  }

  .rating-number {
    font-size: 64px;
    font-weight: 800;
    color: var(--gold);
    line-height: 1;
    display: block;
  }

  .rating-stars {
    font-size: 20px;
    display: block;
    margin: 4px 0;
    letter-spacing: 2px;
  }

  .rating-count {
    font-size: 12px;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .rating-divider {
    width: 1px;
    height: 80px;
    background: var(--border);
    display: none;
  }

  @media (min-width: 600px) {
    .rating-divider {
      display: block;
    }
  }

  .rating-info {
    text-align: center;
  }

  @media (min-width: 600px) {
    .rating-info {
      text-align: left;
    }
  }

  .rating-info h3 {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 6px;
    color: var(--text-primary);
  }

  .rating-info p {
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.6;
  }

  .google-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid var(--border);
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 10px;
  }

  .google-g {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: linear-gradient(135deg, #4285F4, #EA4335, #FBBC05, #34A853);
    display: inline-block;
    flex-shrink: 0;
  }

  .reviews-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 20px;
  }

  @media (min-width: 640px) {
    .reviews-grid {
      grid-template-columns: repeat(2, 1fr);
    }
  }

  @media (min-width: 900px) {
    .reviews-grid {
      grid-template-columns: repeat(3, 1fr);
    }
  }

  .review-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    transition: border-color 0.3s, transform 0.3s;
    position: relative;
  }

  .review-card:hover {
    border-color: rgba(245, 158, 11, 0.3);
    transform: translateY(-3px);
  }

  .review-quote {
    position: absolute;
    top: 16px;
    right: 20px;
    font-size: 40px;
    color: rgba(245, 158, 11, 0.1);
    line-height: 1;
    font-family: Georgia, serif;
  }

  .review-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
  }

  .review-avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 700;
    flex-shrink: 0;
  }

  .avatar-1 { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; }
  .avatar-2 { background: linear-gradient(135deg, #f093fb, #f5576c); color: #fff; }
  .avatar-3 { background: linear-gradient(135deg, #4facfe, #00f2fe); color: #fff; }

  .review-author {
    flex: 1;
  }

  .review-name {
    font-size: 14px;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 2px;
  }

  .review-date {
    font-size: 11px;
    color: var(--text-secondary);
  }

  .review-stars {
    font-size: 13px;
    letter-spacing: 1px;
    margin-bottom: 12px;
  }

  .review-text {
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.7;
  }

  /* ===== CONTACT ===== */
  #contato {
    background: var(--bg-secondary);
  }

  .contact-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 24px;
  }

  @media (min-width: 760px) {
    .contact-grid {
      grid-template-columns: repeat(3, 1fr);
    }
  }

  .contact-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px 24px;
    transition: border-color 0.3s, transform 0.3s;
  }

  .contact-card:hover {
    border-color: rgba(245, 158, 11, 0.3);
    transform: translateY(-3px);
  }

  .contact-icon {
    width: 48px;
    height: 48px;
    background: linear-gradient(135deg, rgba(245, 158, 11, 0.15), rgba(245, 158, 11, 0.05));
    border: 1px solid rgba(245, 158, 11, 0.2);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    margin-bottom: 18px;
  }

  .contact-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 8px;
  }

  .contact-value {
    font-size: 15px;
    color: var(--text-primary);
    font-weight: 600;
    line-height: 1.5;
    margin-bottom: 6px;
  }

  .contact-value a {
    color: var(--text-primary);
    text-decoration: none;
    transition: color 0.2s;
  }

  .contact-value a:hover {
    color: var(--gold);
  }

  .contact-sub {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.6;
  }

  .hours-list {
    list-style: none;
    margin-top: 8px;
  }

  .hours-list li {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    padding: 6px 0;
    border-bottom: 1px solid rgba(255, 255, 255, 0.04);
  }

  .hours-list li:last-child {
    border-bottom: none;
  }

  .hours-list .day {
    color: var(--text-secondary);
  }

  .hours-list .time {
    color: var(--text-primary);
    font-weight: 600;
  }

  .hours-list .closed {
    color: #ef4444;
    font-weight: 600;
  }

  .open-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(37, 211, 102, 0.1);
    border: 1px solid rgba(37, 211, 102, 0.3);
    color: var(--whatsapp);
    font-size: 11px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 20px;
    margin-top: 12px;
  }

  .open-dot {
    width: 6px;
    height: 6px;
    background: var(--whatsapp);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .contact-map-placeholder {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    margin-top: 24px;
    height: 160px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    position: relative;
    overflow: hidden;
  }

  .contact-map-placeholder::before {
    content: '';
    position: absolute;
    inset: 0;
    background: 
      repeating-linear-gradient(0deg, rgba(245,158,11,0.02) 0px, rgba(245,158,11,0.02) 1px, transparent 1px, transparent 40px),
      repeating-linear-gradient(90deg, rgba(245,158,11,0.02) 0px, rgba(245,158,11,0.02) 1px, transparent 1px, transparent 40px);
  }

  .contact-map-placeholder .map-pin {
    font-size: 32px;
    position: relative;
    z-index: 1;
  }

  .contact-map-placeholder p {
    font-size: 13px;
    color: var(--text-secondary);
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 0 20px;
  }

  .map-cta {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--gold);
    text-decoration: none;
    font-size: 13px;
    font-weight: 600;
    position: relative;
    z-index: 1;
    padding: 8px 16px;
    background: rgba(245, 158, 11, 0.1);
    border: 1px solid rgba(245, 158, 11, 0.2);
    border-radius: 8px;
    transition: background 0.2s;
  }

  .map-cta:hover {
    background: rgba(245, 158, 11, 0.2);
  }

  /* ===== CTA BANNER ===== */
  #cta-banner {
    background: linear-gradient(135deg, #1a0f00, #0f0a00, #1a1200);
    border-top: 1px solid rgba(245, 158, 11, 0.15);
    border-bottom: 1px solid rgba(245, 158, 11, 0.15);
    text-align: center;
    padding: 60px 20px;
    position: relative;
    overflow: hidden;
  }

  #cta-banner::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, rgba(245, 158, 11, 0.08) 0%, transparent 70%);
    pointer-events: none;
  }
