<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Barbearia Pixel Cut - São Paulo Zona Oeste. Cortes masculinos, barba e muito mais em Pinheiros. Avaliação 4.9/5 no Google. Agende agora!">
<title>Barbearia Pixel Cut | Pinheiros - São Paulo</title>
<style>
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  :root {
    --bg-main: #0A0A0A;
    --bg-alt: #111111;
    --bg-card: #1A1A1A;
    --gold: #F59E0B;
    --gold-light: #FCD34D;
    --gold-dark: #D97706;
    --whatsapp: #25D366;
    --whatsapp-dark: #1DA851;
    --text-primary: #FFFFFF;
    --text-secondary: #9CA3AF;
    --border: #2A2A2A;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  html {
    scroll-behavior: smooth;
  }

  body {
    background-color: var(--bg-main);
    color: var(--text-primary);
    font-family: var(--font);
    line-height: 1.6;
    overflow-x: hidden;
  }

  /* ===== SCROLLBAR ===== */
  ::-webkit-scrollbar {
    width: 6px;
  }
  ::-webkit-scrollbar-track {
    background: var(--bg-main);
  }
  ::-webkit-scrollbar-thumb {
    background: var(--gold);
    border-radius: 3px;
  }

  /* ===== HEADER ===== */
  header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 1000;
    background: rgba(10, 10, 10, 0.95);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
    padding: 0 1rem;
  }

  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    text-decoration: none;
  }

  .logo-icon {
    font-size: 1.5rem;
    line-height: 1;
  }

  .logo-text {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 0.02em;
    line-height: 1.2;
  }

  .logo-text span {
    display: block;
    font-size: 0.65rem;
    font-weight: 400;
    color: var(--text-secondary);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  nav {
    display: flex;
    align-items: center;
    gap: 0.25rem;
  }

  nav a {
    color: var(--text-secondary);
    text-decoration: none;
    font-size: 0.85rem;
    font-weight: 500;
    padding: 0.4rem 0.75rem;
    border-radius: 6px;
    transition: color 0.2s, background 0.2s;
    white-space: nowrap;
  }

  nav a:hover {
    color: var(--gold);
    background: rgba(245, 158, 11, 0.08);
  }

  .nav-cta {
    background: var(--gold) !important;
    color: #000 !important;
    font-weight: 600 !important;
    padding: 0.4rem 1rem !important;
    border-radius: 6px;
    transition: background 0.2s, transform 0.1s !important;
  }

  .nav-cta:hover {
    background: var(--gold-light) !important;
    transform: translateY(-1px);
  }

  .menu-toggle {
    display: none;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
    padding: 4px;
    background: none;
    border: none;
  }

  .menu-toggle span {
    display: block;
    width: 24px;
    height: 2px;
    background: var(--gold);
    border-radius: 2px;
    transition: all 0.3s;
  }

  .mobile-menu {
    display: none;
    position: fixed;
    top: 64px;
    left: 0;
    right: 0;
    background: rgba(10, 10, 10, 0.98);
    border-bottom: 1px solid var(--border);
    padding: 1rem;
    z-index: 999;
    flex-direction: column;
    gap: 0.25rem;
  }

  .mobile-menu.open {
    display: flex;
  }

  .mobile-menu a {
    color: var(--text-secondary);
    text-decoration: none;
    font-size: 1rem;
    font-weight: 500;
    padding: 0.75rem 1rem;
    border-radius: 8px;
    transition: color 0.2s, background 0.2s;
    border: 1px solid transparent;
  }

  .mobile-menu a:hover {
    color: var(--gold);
    background: rgba(245, 158, 11, 0.08);
    border-color: var(--border);
  }

  .mobile-menu .mob-cta {
    background: var(--gold);
    color: #000 !important;
    font-weight: 700 !important;
    text-align: center;
    margin-top: 0.5rem;
    border-color: var(--gold) !important;
  }

  /* ===== HERO ===== */
  #hero {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    padding: 7rem 1rem 4rem;
    text-align: center;
    background: var(--bg-main);
  }

  .hero-bg {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 30%, rgba(245, 158, 11, 0.12) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 20% 80%, rgba(245, 158, 11, 0.05) 0%, transparent 50%),
      radial-gradient(ellipse 50% 50% at 80% 20%, rgba(245, 158, 11, 0.06) 0%, transparent 50%);
    pointer-events: none;
  }

  .hero-grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(245, 158, 11, 0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(245, 158, 11, 0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 80%);
    -webkit-mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 80%);
  }

  .hero-deco {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
  }

  .hero-deco-1 {
    width: 400px;
    height: 400px;
    border: 1px solid rgba(245, 158, 11, 0.08);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  .hero-deco-2 {
    width: 600px;
    height: 600px;
    border: 1px solid rgba(245, 158, 11, 0.05);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  .hero-deco-3 {
    width: 800px;
    height: 800px;
    border: 1px solid rgba(245, 158, 11, 0.03);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  .hero-content {
    position: relative;
    z-index: 2;
    max-width: 800px;
  }

  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    background: rgba(245, 158, 11, 0.1);
    border: 1px solid rgba(245, 158, 11, 0.3);
    color: var(--gold);
    font-size: 0.8rem;
    font-weight: 600;
    padding: 0.4rem 1rem;
    border-radius: 100px;
    margin-bottom: 1.5rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .hero-badge::before {
    content: '⭐';
    font-size: 0.9rem;
  }

  .hero-title {
    font-size: clamp(2.2rem, 8vw, 4.5rem);
    font-weight: 800;
    line-height: 1.1;
    margin-bottom: 0.5rem;
    letter-spacing: -0.02em;
  }

  .hero-title .gold {
    color: var(--gold);
    position: relative;
    display: inline-block;
  }

  .hero-title .gold::after {
    content: '';
    position: absolute;
    bottom: -4px;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    border-radius: 2px;
  }

  .hero-location {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    color: var(--text-secondary);
    font-size: 0.95rem;
    font-weight: 500;
    margin: 1rem 0 1.5rem;
  }

  .hero-location::before {
    content: '📍';
    font-size: 1rem;
  }

  .hero-subtitle {
    font-size: clamp(1rem, 3vw, 1.25rem);
    color: var(--text-secondary);
    max-width: 560px;
    margin: 0 auto 2.5rem;
    line-height: 1.7;
  }

  .hero-buttons {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
  }

  @media (min-width: 480px) {
    .hero-buttons {
      flex-direction: row;
      justify-content: center;
    }
  }

  .btn-whatsapp {
    display: inline-flex;
    align-items: center;
    gap: 0.6rem;
    background: var(--whatsapp);
    color: #fff;
    font-size: 1rem;
    font-weight: 700;
    padding: 0.9rem 2rem;
    border-radius: 12px;
    text-decoration: none;
    transition: all 0.2s;
    box-shadow: 0 4px 24px rgba(37, 211, 102, 0.3);
    white-space: nowrap;
  }

  .btn-whatsapp:hover {
    background: var(--whatsapp-dark);
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(37, 211, 102, 0.4);
  }

  .btn-whatsapp:active {
    transform: translateY(0);
  }

  .btn-outline {
    display: inline-flex;
    align-items: center;
    gap: 0.6rem;
    background: transparent;
    color: var(--gold);
    font-size: 1rem;
    font-weight: 600;
    padding: 0.9rem 2rem;
    border-radius: 12px;
    text-decoration: none;
    border: 1.5px solid var(--gold);
    transition: all 0.2s;
    white-space: nowrap;
  }

  .btn-outline:hover {
    background: rgba(245, 158, 11, 0.08);
    transform: translateY(-2px);
  }

  .hero-stats {
    display: flex;
    justify-content: center;
    gap: 2rem;
    margin-top: 3.5rem;
    flex-wrap: wrap;
  }

  .hero-stat {
    text-align: center;
  }

  .hero-stat-value {
    display: block;
    font-size: 1.8rem;
    font-weight: 800;
    color: var(--gold);
    line-height: 1;
  }

  .hero-stat-label {
    display: block;
    font-size: 0.75rem;
    color: var(--text-secondary);
    margin-top: 0.3rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .hero-divider {
    width: 1px;
    height: 40px;
    background: var(--border);
    align-self: center;
  }

  /* ===== SECTION BASE ===== */
  section {
    padding: 5rem 1rem;
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
  }

  .section-label {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--gold);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 0.75rem;
  }

  .section-label::before,
  .section-label::after {
    content: '';
    display: block;
    width: 24px;
    height: 1px;
    background: var(--gold);
    opacity: 0.5;
  }

  .section-title {
    font-size: clamp(1.75rem, 5vw, 2.5rem);
    font-weight: 800;
    line-height: 1.2;
    margin-bottom: 1rem;
    letter-spacing: -0.02em;
  }

  .section-desc {
    font-size: 1rem;
    color: var(--text-secondary);
    max-width: 520px;
    line-height: 1.7;
  }

  .section-header {
    text-align: center;
    margin-bottom: 3rem;
  }

  .section-header .section-label {
    justify-content: center;
  }

  .section-header .section-desc {
    margin: 0 auto;
  }

  /* ===== SERVICES ===== */
  #servicos {
    background: var(--bg-alt);
  }

  .services-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 1.25rem;
  }

  @media (min-width: 480px) {
    .services-grid {
      grid-template-columns: repeat(2, 1fr);
    }
  }

  @media (min-width: 900px) {
    .services-grid {
      grid-template-columns: repeat(4, 1fr);
    }
  }

  .service-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.75rem 1.5rem;
    position: relative;
    overflow: hidden;
    transition: transform 0.25s, border-color 0.25s, box-shadow 0.25s;
    cursor: default;
  }

  .service-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    opacity: 0;
    transition: opacity 0.25s;
  }

  .service-card:hover {
    transform: translateY(-6px);
    border-color: rgba(245, 158, 11, 0.3);
    box-shadow: 0 12px 40px rgba(0,0,0,0.4);
  }

  .service-card:hover::before {
    opacity: 1;
  }

  .service-card.featured {
    border-color: rgba(245, 158, 11, 0.4);
    background: linear-gradient(135deg, #1A1A1A 0%, #1f1a0f 100%);
  }

  .service-card.featured::before {
    opacity: 1;
  }

  .service-badge {
    position: absolute;
    top: 1rem;
    right: 1rem;
    background: var(--gold);
    color: #000;
    font-size: 0.65rem;
    font-weight: 700;
    padding: 0.2rem 0.6rem;
    border-radius: 100px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .service-icon {
    font-size: 2.5rem;
    line-height: 1;
    margin-bottom: 1rem;
    display: block;
  }

  .service-name {
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 0.5rem;
  }

  .service-desc {
    font-size: 0.85rem;
    color: var(--text-secondary);
    line-height: 1.6;
    margin-bottom: 1.25rem;
  }

  .service-price {
    display: flex;
    align-items: baseline;
    gap: 0.25rem;
  }

  .service-price .currency {
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--gold);
  }

  .service-price .value {
    font-size: 1.75rem;
    font-weight: 800;
    color: var(--gold);
    line-height: 1;
  }

  .service-price .period {
    font-size: 0.8rem;
    color: var(--text-secondary);
  }

  .service-cta {
    display: block;
    text-align: center;
    margin-top: 1.25rem;
    padding: 0.65rem 1rem;
    background: rgba(245, 158, 11, 0.1);
    border: 1px solid rgba(245, 158, 11, 0.2);
    border-radius: 8px;
    color: var(--gold);
    font-size: 0.85rem;
    font-weight: 600;
    text-decoration: none;
    transition: all 0.2s;
  }

  .service-cta:hover {
    background: var(--gold);
    color: #000;
    border-color: var(--gold);
  }

  /* ===== AVALIAÇÃO ===== */
  #avaliacoes {
    background: var(--bg-main);
  }

  .rating-highlight {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2.5rem 2rem;
    margin-bottom: 3rem;
    position: relative;
    overflow: hidden;
    text-align: center;
  }

  .rating-highlight::before {
    content: '';
    position: absolute;
    top: -60px;
    left: 50%;
    transform: translateX(-50%);
    width: 300px;
    height: 300px;
    background: radial-gradient(circle, rgba(245, 158, 11, 0.1) 0%, transparent 70%);
    pointer-events: none;
  }

  @media (min-width: 640px) {
    .rating-highlight {
      flex-direction: row;
      text-align: left;
    }
  }

  .rating-number-block {
    flex-shrink: 0;
    text-align: center;
  }

  .rating-big {
    font-size: 4.5rem;
    font-weight: 800;
    color: var(--gold);
    line-height: 1;
    letter-spacing: -0.04em;
  }

  .rating-of {
    font-size: 1rem;
    color: var(--text-secondary);
    font-weight: 500;
  }

  .rating-stars-row {
    display: flex;
    gap: 0.25rem;
    justify-content: center;
    margin: 0.5rem 0;
    font-size: 1.5rem;
  }

  .rating-info {
    flex: 1;
  }

  .rating-info h3 {
    font-size: 1.4rem;
    font-weight: 700;
    margin-bottom: 0.5rem;
  }

  .rating-info p {
    color: var(--text-secondary);
    font-size: 0.95rem;
    line-height: 1.6;
  }

  .rating-count {
    color: var(--gold) !important;
    font-weight: 700;
  }

  .rating-divider {
    width: 1px;
    height: 80px;
    background: var(--border);
    flex-shrink: 0;
    display: none;
  }

  @media (min-width: 640px) {
    .rating-divider {
      display: block;
    }
  }

  .google-badge {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
    background: rgba(245, 158, 11, 0.06);
    border: 1px solid rgba(245, 158, 11, 0.15);
    border-radius: 12px;
    padding: 1rem 1.5rem;
  }

  .google-logo {
    font-size: 1.5rem;
    font-weight: 900;
    letter-spacing: -0.02em;
  }

  .google-logo .g-b { color: #4285F4; }
  .google-logo .g-r { color: #EA4335; }
  .google-logo .g-y { color: #FBBC04; }
  .google-logo .g-g { color: #34A853; }
  .google-logo .g-r2 { color: #EA4335; }

  .google-label {
    font-size: 0.7rem;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 600;
  }

  .reviews-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 1.25rem;
  }

  @media (min-width: 640px) {
    .reviews-grid {
      grid-template-columns: repeat(2, 1fr);
    }
  }

  @media (min-width: 960px) {
    .reviews-grid {
      grid-template-columns: repeat(3, 1fr);
    }
  }

  .review-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.5rem;
    transition: transform 0.2s, border-color 0.2s;
    position: relative;
  }

  .review-card::before {
    content: '"';
    position: absolute;
    top: 1rem;
    right: 1.25rem;
    font-size: 4rem;
    color: var(--gold);
    opacity: 0.15;
    font-family: Georgia, serif;
    line-height: 1;
  }

  .review-card:hover {
    transform: translateY(-4px);
    border-color: rgba(245, 158, 11, 0.2);
  }

  .review-header {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 1rem;
  }

  .review-avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    font-weight: 700;
    color: #000;
    flex-shrink: 0;
  }

  .review-avatar.av1 { background: linear-gradient(135deg, #F59E0B, #FCD34D); }
  .review-avatar.av2 { background: linear-gradient(135deg, #3B82F6, #60A5FA); }
  .review-avatar.av3 { background: linear-gradient(135deg, #10B981, #34D399); }

  .review-meta {
    flex: 1;
  }

  .review-name {
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--text-primary);
  }

  .review-date {
    font-size: 0.75rem;
    color: var(--text-secondary);
    margin-top: 0.1rem;
  }

  .review-stars {
    font-size: 0.9rem;
    letter-spacing: 0.05em;
    margin-bottom: 0.75rem;
  }

  .review-text {
    font-size: 0.9rem;
    color: var(--text-secondary);
    line-height: 1.65;
    font-style: italic;
  }

  .review-service {
    display: inline-block;
    margin-top: 0.75rem;
    background: rgba(245, 158, 11, 0.1);
    border: 1px solid rgba(245, 158, 11, 0.2);
    color: var(--gold);
    font-size: 0.7rem;
    font-weight: 600;
    padding: 0.2rem 0.6rem;
    border-radius: 100px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  /* ===== CONTATO ===== */
  #contato {
    background: var(--bg-alt);
  }

    display: grid;
    grid-template-columns: 1fr;
    gap: 2rem;
  }

  @media (min-width: 768px) {
    .contact-grid {
      grid-template-columns: repeat(3, 1fr);
    }
  }

  .contact-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.75rem 1.5rem;
    transition: transform 0.2s, border-color 0.2s;
  }

  .contact-card:hover {
    transform: translateY(-4px);
    border-color: rgba(245, 158, 11, 0.25);
  }

  .contact-icon {
    font-size: 2rem;
    margin-bottom: 1rem;
    display: block;
  }

  .contact-card h3 {
    font-size: 1rem;
    font-weight: 700;
    color: var(--gold);
    margin-bottom: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-size: 0.85rem;
  }

  .contact-card p,
  .contact-card a {
    font-size: 0.95rem;
    color: var(--text-secondary);
    line-height: 1.7;
    text-decoration: none;
    display: block;
  }

  .contact-card a {
    color: var(--text-primary);
    font-weight: 600;
    font-size: 1.05rem;
    transition: color 0.2s;
  }

  .contact-card a:hover {
