<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Barbearia Veracruz - São Paulo Zona Norte. Cortes masculinos, barba e muito mais. Agende pelo WhatsApp!">
<title>Barbearia Veracruz | São Paulo Zona Norte</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-main: #0A0A0A;
    --bg-alt: #111111;
    --bg-card: #1A1A1A;
    --gold: #F59E0B;
    --gold-light: #FCD34D;
    --gold-dark: #D97706;
    --green-wa: #25D366;
    --green-wa-dark: #1DAA55;
    --text: #FFFFFF;
    --text-secondary: #9CA3AF;
    --border: #2A2A2A;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: var(--font);
    background-color: var(--bg-main);
    color: var(--text);
    line-height: 1.6;
    overflow-x: hidden;
  }

  /* ===== SCROLLBAR ===== */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg-main); }
  ::-webkit-scrollbar-thumb { background: var(--gold-dark); border-radius: 3px; }

  /* ===== HEADER ===== */
  header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 1000;
    background: rgba(10,10,10,0.97);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }

  .header-inner {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 20px;
    height: 68px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
  }

  .logo-icon {
    width: 42px;
    height: 42px;
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    box-shadow: 0 0 16px rgba(245,158,11,0.35);
    flex-shrink: 0;
  }

  .logo-text {
    display: flex;
    flex-direction: column;
    line-height: 1.2;
  }

  .logo-name {
    font-size: 17px;
    font-weight: 800;
    color: var(--gold);
    letter-spacing: 0.5px;
  }

  .logo-sub {
    font-size: 11px;
    color: var(--text-secondary);
    font-weight: 400;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  nav { display: flex; align-items: center; gap: 6px; }

  nav a {
    color: var(--text-secondary);
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    padding: 6px 12px;
    border-radius: 6px;
    transition: color 0.2s, background 0.2s;
  }

  nav a:hover { color: var(--gold); background: rgba(245,158,11,0.08); }

  .nav-cta {
    background: var(--green-wa) !important;
    color: #fff !important;
    padding: 8px 16px !important;
    border-radius: 8px !important;
    font-weight: 700 !important;
    font-size: 13px !important;
    transition: background 0.2s, transform 0.2s !important;
  }

  .nav-cta:hover { background: var(--green-wa-dark) !important; transform: translateY(-1px); }

  /* Mobile menu toggle */
  .menu-toggle {
    display: none;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
    padding: 6px;
    border: none;
    background: none;
  }

  .menu-toggle span {
    display: block;
    width: 24px;
    height: 2px;
    background: var(--gold);
    border-radius: 2px;
    transition: all 0.3s;
  }

  /* ===== HERO ===== */
  #hero {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 100px 20px 60px;
    position: relative;
    overflow: hidden;
    background: var(--bg-main);
  }

  .hero-bg {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 0%, rgba(245,158,11,0.12) 0%, transparent 65%),
      radial-gradient(ellipse 60% 40% at 20% 80%, rgba(245,158,11,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 80% 70%, rgba(37,211,102,0.04) 0%, transparent 55%);
    pointer-events: none;
  }

  /* decorative lines */
  .hero-lines {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
  }

  .hero-lines::before {
    content: '';
    position: absolute;
    top: -100px;
    left: 50%;
    transform: translateX(-50%);
    width: 1px;
    height: 300px;
    background: linear-gradient(to bottom, transparent, rgba(245,158,11,0.4), transparent);
  }

  .hero-lines::after {
    content: '';
    position: absolute;
    top: 50%;
    left: -200px;
    width: 600px;
    height: 1px;
    background: linear-gradient(to right, transparent, rgba(245,158,11,0.15), transparent);
  }

  /* decorative circles */
  .hero-circle-1 {
    position: absolute;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    border: 1px solid rgba(245,158,11,0.07);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }

  .hero-circle-2 {
    position: absolute;
    width: 650px;
    height: 650px;
    border-radius: 50%;
    border: 1px solid rgba(245,158,11,0.04);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }

  .hero-content {
    position: relative;
    z-index: 2;
    max-width: 700px;
  }

  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(245,158,11,0.12);
    border: 1px solid rgba(245,158,11,0.3);
    border-radius: 100px;
    padding: 6px 16px;
    font-size: 13px;
    color: var(--gold);
    font-weight: 600;
    letter-spacing: 0.5px;
    margin-bottom: 28px;
    animation: fadeInDown 0.6s ease both;
  }

  .hero-badge::before { content: '⭐'; }

  .hero-city {
    font-size: 13px;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 3px;
    font-weight: 600;
    margin-bottom: 16px;
    animation: fadeInDown 0.6s 0.1s ease both;
  }

  .hero-title {
    font-size: clamp(38px, 9vw, 76px);
    font-weight: 900;
    line-height: 1.05;
    margin-bottom: 20px;
    animation: fadeInUp 0.7s 0.2s ease both;
  }

  .hero-title .line1 { display: block; color: var(--text); }
  .hero-title .line2 {
    display: block;
    background: linear-gradient(90deg, var(--gold), var(--gold-light), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .hero-subtitle {
    font-size: clamp(16px, 3vw, 20px);
    color: var(--text-secondary);
    max-width: 520px;
    margin: 0 auto 36px;
    line-height: 1.65;
    animation: fadeInUp 0.7s 0.35s ease both;
  }

  .hero-subtitle strong { color: var(--gold); }

  .hero-actions {
    display: flex;
    gap: 14px;
    justify-content: center;
    flex-wrap: wrap;
    animation: fadeInUp 0.7s 0.5s ease both;
  }

  .btn-wa {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--green-wa);
    color: #fff;
    font-size: 16px;
    font-weight: 800;
    padding: 16px 32px;
    border-radius: 50px;
    text-decoration: none;
    transition: background 0.25s, transform 0.25s, box-shadow 0.25s;
    box-shadow: 0 6px 30px rgba(37,211,102,0.35);
    letter-spacing: 0.3px;
  }

  .btn-wa:hover {
    background: var(--green-wa-dark);
    transform: translateY(-3px);
    box-shadow: 0 12px 40px rgba(37,211,102,0.45);
  }

  .btn-wa-icon { font-size: 20px; }

  .btn-outline {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: transparent;
    color: var(--gold);
    font-size: 15px;
    font-weight: 700;
    padding: 15px 28px;
    border-radius: 50px;
    text-decoration: none;
    border: 2px solid var(--gold);
    transition: background 0.25s, color 0.25s, transform 0.25s;
  }

  .btn-outline:hover {
    background: var(--gold);
    color: var(--bg-main);
    transform: translateY(-3px);
  }

  .hero-stats {
    display: flex;
    gap: 32px;
    justify-content: center;
    margin-top: 56px;
    flex-wrap: wrap;
    animation: fadeInUp 0.7s 0.65s ease both;
  }

  .hero-stat {
    text-align: center;
    position: relative;
  }

  .hero-stat:not(:last-child)::after {
    content: '';
    position: absolute;
    right: -16px;
    top: 50%;
    transform: translateY(-50%);
    width: 1px;
    height: 36px;
    background: var(--border);
  }

  .hero-stat-num {
    font-size: 28px;
    font-weight: 900;
    color: var(--gold);
    line-height: 1;
  }

  .hero-stat-label {
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 500;
  }

  /* ===== SECTION COMMONS ===== */
  section { padding: 90px 20px; }

  .container { max-width: 1100px; margin: 0 auto; }

  .section-tag {
    display: inline-block;
    background: rgba(245,158,11,0.1);
    border: 1px solid rgba(245,158,11,0.25);
    color: var(--gold);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    padding: 5px 14px;
    border-radius: 100px;
    margin-bottom: 16px;
  }

  .section-title {
    font-size: clamp(26px, 5vw, 42px);
    font-weight: 900;
    color: var(--text);
    line-height: 1.15;
    margin-bottom: 12px;
  }

  .section-title span {
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .section-desc {
    font-size: 17px;
    color: var(--text-secondary);
    max-width: 520px;
    margin: 0 auto 56px;
    line-height: 1.7;
  }

  .text-center { text-align: center; }

  /* ===== SERVICES ===== */
  #servicos { background: var(--bg-alt); }

  .services-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
    gap: 24px;
  }

  .service-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px 24px;
    text-align: center;
    position: relative;
    overflow: hidden;
    transition: transform 0.3s, border-color 0.3s, box-shadow 0.3s;
    cursor: default;
  }

  .service-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--gold-dark), var(--gold), var(--gold-light));
    opacity: 0;
    transition: opacity 0.3s;
  }

  .service-card:hover {
    transform: translateY(-6px);
    border-color: rgba(245,158,11,0.4);
    box-shadow: 0 20px 50px rgba(0,0,0,0.4), 0 0 0 1px rgba(245,158,11,0.1);
  }

  .service-card:hover::before { opacity: 1; }

  .service-card.popular {
    border-color: rgba(245,158,11,0.35);
    box-shadow: 0 8px 30px rgba(245,158,11,0.1);
  }

  .service-card.popular::before { opacity: 1; }

  .popular-badge {
    position: absolute;
    top: 14px;
    right: 14px;
    background: var(--gold);
    color: var(--bg-main);
    font-size: 10px;
    font-weight: 800;
    padding: 3px 10px;
    border-radius: 100px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .service-icon {
    width: 72px;
    height: 72px;
    background: linear-gradient(135deg, rgba(245,158,11,0.15), rgba(245,158,11,0.05));
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    margin: 0 auto 20px;
    border: 1px solid rgba(245,158,11,0.2);
    transition: transform 0.3s;
  }

  .service-card:hover .service-icon { transform: scale(1.1) rotate(-5deg); }

  .service-name {
    font-size: 19px;
    font-weight: 800;
    color: var(--text);
    margin-bottom: 8px;
  }

  .service-desc {
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.6;
    margin-bottom: 22px;
  }

  .service-price {
    font-size: 32px;
    font-weight: 900;
    color: var(--gold);
    line-height: 1;
  }

  .service-price sup {
    font-size: 16px;
    font-weight: 700;
    vertical-align: super;
    line-height: 0;
  }

  .service-cta {
    display: block;
    margin-top: 20px;
    background: rgba(37,211,102,0.1);
    border: 1px solid rgba(37,211,102,0.3);
    color: var(--green-wa);
    font-size: 13px;
    font-weight: 700;
    padding: 10px;
    border-radius: 10px;
    text-decoration: none;
    transition: background 0.25s, transform 0.2s;
  }

  .service-cta:hover {
    background: var(--green-wa);
    color: #fff;
    border-color: var(--green-wa);
    transform: translateY(-2px);
  }

  /* ===== REVIEWS ===== */
  #avaliacoes { background: var(--bg-main); }

  .reviews-hero {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 40px;
    flex-wrap: wrap;
    margin-bottom: 56px;
    padding: 40px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 24px;
    position: relative;
    overflow: hidden;
  }

  .reviews-hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 60% 80% at 50% 50%, rgba(245,158,11,0.05), transparent);
    pointer-events: none;
  }

  .reviews-score { text-align: center; }

  .reviews-number {
    font-size: 80px;
    font-weight: 900;
    color: var(--gold);
    line-height: 1;
    letter-spacing: -3px;
  }

  .reviews-stars-big { font-size: 28px; margin: 8px 0; letter-spacing: 2px; }

  .reviews-count {
    font-size: 15px;
    color: var(--text-secondary);
    font-weight: 500;
  }

  .reviews-divider {
    width: 1px;
    height: 100px;
    background: var(--border);
  }

  .reviews-info { max-width: 340px; }

  .reviews-info-title {
    font-size: 22px;
    font-weight: 800;
    color: var(--text);
    margin-bottom: 10px;
    line-height: 1.3;
  }

  .reviews-info-title span { color: var(--gold); }

  .reviews-info-desc {
    font-size: 15px;
    color: var(--text-secondary);
    line-height: 1.65;
    margin-bottom: 18px;
  }

  .google-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 14px;
    font-size: 13px;
    color: var(--text-secondary);
    font-weight: 500;
  }

  .google-g {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: linear-gradient(135deg, #4285F4 25%, #EA4335 25% 50%, #FBBC05 50% 75%, #34A853 75%);
    flex-shrink: 0;
  }

  .reviews-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
    gap: 22px;
  }

  .review-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 26px;
    position: relative;
    transition: transform 0.3s, border-color 0.3s;
  }

  .review-card:hover {
    transform: translateY(-4px);
    border-color: rgba(245,158,11,0.25);
  }

  .review-card::before {
    content: '"';
    position: absolute;
    top: 14px;
    right: 22px;
    font-size: 64px;
    color: rgba(245,158,11,0.12);
    font-family: Georgia, serif;
    line-height: 1;
  }

  .review-stars { font-size: 16px; letter-spacing: 2px; margin-bottom: 14px; }

  .review-text {
    font-size: 15px;
    color: var(--text-secondary);
    line-height: 1.7;
    margin-bottom: 20px;
    font-style: italic;
  }

  .reviewer {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .reviewer-avatar {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 17px;
    font-weight: 900;
    color: var(--bg-main);
    flex-shrink: 0;
  }

  .reviewer-name {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
  }

  .reviewer-date {
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 2px;
  }

  /* ===== CONTACT ===== */
  #contato { background: var(--bg-alt); }

  .contact-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 32px;
    align-items: start;
  }

  .contact-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
  }

  .contact-card-title {
    font-size: 18px;
    font-weight: 800;
    color: var(--text);
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .contact-card-title-icon {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    background: rgba(245,158,11,0.1);
    border: 1px solid rgba(245,158,11,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  .contact-item {
    display: flex;
    gap: 14px;
    align-items: flex-start;
    padding: 16px 0;
    border-bottom: 1px solid var(--border);
  }

  .contact-item:last-child { border-bottom: none; padding-bottom: 0; }
  .contact-item:first-child { padding-top: 0; }

  .contact-item-icon {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    background: rgba(245,158,11,0.08);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .contact-item-label {
    font-size: 12px;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    font-weight: 600;
    margin-bottom: 4px;
  }

  .contact-item-value {
    font-size: 15px;
    color: var(--text);
    font-weight: 500;
    line-height: 1.5;
  }

  .contact-item-value a {
    color: var(--gold);
    text-decoration: none;
    transition: color 0.2s;
  }

  .contact-item-value a:hover { color: var(--gold-light); text-decoration: underline; }

  /* hours table */
  .hours-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
    font-size: 15px;
  }

  .hours-row:last-child { border-bottom: none; padding-bottom: 0; }
  .hours-row:first-child { padding-top: 0; }

  .hours-day { color: var(--text-secondary); font-weight: 500; }
  .hours-time { color: var(--text); font-weight: 700; }

  .hours-status {
    display: inline-block;
    font-size: 11px;
    font-weight: 700;
    padding: 3px 9px;
    border-radius: 100px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .status-open { background: rgba(37,211,102,0.12); color: var(--green-wa); border: 1px solid rgba(37,211,102,0.25); }
  .status-closed { background: rgba(255,50,50,0.1); color: #FC8181; border: 1px solid rgba(255,50,50,0.2); }

  .map-placeholder {
    border-radius: 16px;
    overflow: hidden;
    height: 200px;
    background: linear-gradient(135deg, #141414, #1E1E1E);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
    margin-top: 20px;
    position: relative;
  }

  .map-placeholder::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(245,158,11,0.04) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(245,158,11,0.04) 40px);
  }

  .map-pin { font-size: 36px; position: relative; z-index: 1; }
  .map-label { font-size: 13px; color: var(--text-secondary); position: relative; z-index: 1; text-align: center; line-height: 1.5; padding: 0 20px; }

  .btn-directions {
    position: relative;
    z-index: 1;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(245,158,11,0.12);
    border: 1px solid rgba(245,158,11,0.3);
    color: var(--gold);
    font-size: 13px;
    font-weight: 700;
    padding: 8px 18px;
    border-radius: 100px;
    text-decoration: none;
    transition: background 0.2s, transform 0.2s;
  }

  .btn-directions:hover { background: var(--gold); color: var(--bg-main); transform: translateY(-2px); }

  /* ===== CTA STRIP ===== */
  .cta-strip {
    background: linear-gradient(135deg, #0D0D0D 0%, #1A1208 50%, #0D0D0D 100%);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 70px 20px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .cta-strip::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 70% 90% at 50% 50%, rgba(245,158,11,0.08), transparent);
    pointer-events: none;
  }

  .cta-strip-content { position: relative; z-index: 1; }

  .cta-strip-title {
    font-size: clamp(24px, 5vw, 38px);
    font-weight: 900;
    color: var(--text);
    margin-bottom: 12px;
  }

  .cta-strip-title span { color: var(--gold); }

  .cta-strip-desc {
    font-size: 17px;
    color: var(--text-secondary);
    margin-bottom: 32px;
    max-width: 480px;
    margin-left: auto;
    margin-right: auto;
    line-height: 1.65;
  }
