<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Barbeiro AT Home 24h - Barbearia em São Paulo Centro. Cortes masculinos, barba e serviços premium. Agende pelo WhatsApp!">
<title>BARBEIRO AT HOME 24h 💈 - São Paulo Centro</title>
<style>
  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --bg-primary: #0A0A0A;
    --bg-secondary: #111111;
    --bg-card: #1A1A1A;
    --gold: #F59E0B;
    --gold-dark: #D97706;
    --gold-light: #FCD34D;
    --whatsapp: #25D366;
    --whatsapp-dark: #1da851;
    --text-primary: #FFFFFF;
    --text-secondary: #9CA3AF;
    --border: #2A2A2A;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  html {
    scroll-behavior: smooth;
  }

  body {
    font-family: var(--font);
    background-color: var(--bg-primary);
    color: var(--text-primary);
    line-height: 1.6;
    overflow-x: hidden;
  }

  /* ===== SCROLLBAR ===== */
  ::-webkit-scrollbar {
    width: 6px;
  }
  ::-webkit-scrollbar-track {
    background: var(--bg-primary);
  }
  ::-webkit-scrollbar-thumb {
    background: var(--gold);
    border-radius: 3px;
  }

  /* ===== HEADER ===== */
  header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 1000;
    background: rgba(10, 10, 10, 0.95);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 16px;
  }

  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
  }

  .logo-icon {
    width: 40px;
    height: 40px;
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    box-shadow: 0 0 16px rgba(245, 158, 11, 0.4);
    flex-shrink: 0;
  }

  .logo-text {
    display: flex;
    flex-direction: column;
    line-height: 1.2;
  }

  .logo-name {
    font-size: 13px;
    font-weight: 800;
    color: var(--gold);
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .logo-sub {
    font-size: 10px;
    color: var(--text-secondary);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  nav {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  nav a {
    color: var(--text-secondary);
    text-decoration: none;
    font-size: 13px;
    font-weight: 500;
    padding: 6px 12px;
    border-radius: 6px;
    transition: all 0.2s ease;
    white-space: nowrap;
  }

  nav a:hover {
    color: var(--gold);
    background: rgba(245, 158, 11, 0.08);
  }

  .nav-cta {
    background: var(--whatsapp) !important;
    color: white !important;
    font-weight: 700 !important;
    padding: 8px 16px !important;
    border-radius: 8px !important;
    margin-left: 8px;
    transition: all 0.2s ease !important;
  }

  .nav-cta:hover {
    background: var(--whatsapp-dark) !important;
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(37, 211, 102, 0.3);
  }

  .hamburger {
    display: none;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
    padding: 4px;
    background: none;
    border: none;
    outline: none;
  }

  .hamburger span {
    display: block;
    width: 22px;
    height: 2px;
    background: var(--gold);
    border-radius: 2px;
    transition: all 0.3s ease;
  }

  .mobile-menu {
    display: none;
    position: fixed;
    top: 64px;
    left: 0;
    right: 0;
    background: rgba(10, 10, 10, 0.98);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 16px;
    z-index: 999;
    flex-direction: column;
    gap: 4px;
  }

  .mobile-menu.open {
    display: flex;
  }

  .mobile-menu a {
    color: var(--text-secondary);
    text-decoration: none;
    font-size: 15px;
    font-weight: 500;
    padding: 12px 16px;
    border-radius: 8px;
    transition: all 0.2s ease;
    border-bottom: 1px solid var(--border);
  }

  .mobile-menu a:last-child {
    border-bottom: none;
  }

  .mobile-menu a:hover {
    color: var(--gold);
    background: rgba(245, 158, 11, 0.08);
  }

  /* ===== HERO ===== */
  #hero {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    padding: 100px 16px 60px;
    background: 
      radial-gradient(ellipse at 20% 50%, rgba(245, 158, 11, 0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(245, 158, 11, 0.05) 0%, transparent 50%),
      linear-gradient(180deg, #0A0A0A 0%, #0F0F0F 50%, #0A0A0A 100%);
  }

  .hero-bg-decoration {
    position: absolute;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
  }

  .hero-circle-1 {
    position: absolute;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    border: 1px solid rgba(245, 158, 11, 0.06);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  .hero-circle-2 {
    position: absolute;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    border: 1px solid rgba(245, 158, 11, 0.1);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  .hero-line-1 {
    position: absolute;
    width: 1px;
    height: 200px;
    background: linear-gradient(180deg, transparent, rgba(245, 158, 11, 0.3), transparent);
    top: 10%;
    left: 20%;
    animation: lineFloat 4s ease-in-out infinite;
  }

  .hero-line-2 {
    position: absolute;
    width: 1px;
    height: 150px;
    background: linear-gradient(180deg, transparent, rgba(245, 158, 11, 0.2), transparent);
    top: 30%;
    right: 15%;
    animation: lineFloat 5s ease-in-out infinite 1s;
  }

  @keyframes lineFloat {
    0%, 100% { opacity: 0.4; transform: translateY(0); }
    50% { opacity: 1; transform: translateY(-20px); }
  }

  .hero-content {
    max-width: 800px;
    text-align: center;
    position: relative;
    z-index: 1;
  }

  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(245, 158, 11, 0.1);
    border: 1px solid rgba(245, 158, 11, 0.3);
    color: var(--gold);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 8px 20px;
    border-radius: 50px;
    margin-bottom: 28px;
    animation: fadeInDown 0.6s ease;
  }

  .hero-badge-dot {
    width: 6px;
    height: 6px;
    background: var(--whatsapp);
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(1.5); }
  }

  .hero-title {
    font-size: clamp(32px, 7vw, 72px);
    font-weight: 900;
    line-height: 1.1;
    margin-bottom: 20px;
    animation: fadeInUp 0.7s ease 0.1s both;
  }

  .hero-title-main {
    display: block;
    background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 50%, var(--gold-dark) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .hero-title-sub {
    display: block;
    color: var(--text-primary);
    font-size: clamp(18px, 3.5vw, 32px);
    font-weight: 400;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 8px;
  }

  .hero-city {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--text-secondary);
    font-size: 14px;
    margin-bottom: 16px;
    animation: fadeInUp 0.7s ease 0.2s both;
  }

  .hero-description {
    font-size: clamp(15px, 2.5vw, 18px);
    color: var(--text-secondary);
    max-width: 560px;
    margin: 0 auto 36px;
    line-height: 1.7;
    animation: fadeInUp 0.7s ease 0.3s both;
  }

  .hero-description strong {
    color: var(--gold);
  }

  .hero-buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    justify-content: center;
    animation: fadeInUp 0.7s ease 0.4s both;
  }

  .btn-primary {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: linear-gradient(135deg, var(--whatsapp), var(--whatsapp-dark));
    color: white;
    text-decoration: none;
    font-size: 16px;
    font-weight: 800;
    padding: 16px 32px;
    border-radius: 12px;
    transition: all 0.3s ease;
    box-shadow: 0 8px 24px rgba(37, 211, 102, 0.35);
    letter-spacing: 0.3px;
  }

  .btn-primary:hover {
    transform: translateY(-3px);
    box-shadow: 0 14px 32px rgba(37, 211, 102, 0.45);
  }

  .btn-secondary {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: transparent;
    color: var(--gold);
    text-decoration: none;
    font-size: 15px;
    font-weight: 600;
    padding: 16px 28px;
    border-radius: 12px;
    border: 1.5px solid rgba(245, 158, 11, 0.4);
    transition: all 0.3s ease;
  }

  .btn-secondary:hover {
    background: rgba(245, 158, 11, 0.08);
    border-color: var(--gold);
    transform: translateY(-2px);
  }

  .hero-stats {
    display: flex;
    justify-content: center;
    gap: 40px;
    margin-top: 56px;
    padding-top: 40px;
    border-top: 1px solid var(--border);
    animation: fadeInUp 0.7s ease 0.5s both;
    flex-wrap: wrap;
  }

  .hero-stat {
    text-align: center;
  }

  .hero-stat-number {
    display: block;
    font-size: 28px;
    font-weight: 900;
    color: var(--gold);
    line-height: 1;
    margin-bottom: 4px;
  }

  .hero-stat-label {
    font-size: 12px;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  @keyframes fadeInDown {
    from { opacity: 0; transform: translateY(-16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ===== SECTION COMMONS ===== */
  section {
    padding: 80px 16px;
  }

  .section-inner {
    max-width: 1200px;
    margin: 0 auto;
  }

  .section-header {
    text-align: center;
    margin-bottom: 56px;
  }

  .section-label {
    display: inline-block;
    color: var(--gold);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .section-title {
    font-size: clamp(26px, 5vw, 42px);
    font-weight: 800;
    color: var(--text-primary);
    line-height: 1.2;
    margin-bottom: 14px;
  }

  .section-title span {
    color: var(--gold);
  }

  .section-desc {
    font-size: 16px;
    color: var(--text-secondary);
    max-width: 520px;
    margin: 0 auto;
    line-height: 1.7;
  }

  .divider {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin: 16px auto 0;
    width: 100px;
  }

  .divider-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold));
  }

  .divider-line:last-child {
    background: linear-gradient(90deg, var(--gold), transparent);
  }

  .divider-dot {
    width: 6px;
    height: 6px;
    background: var(--gold);
    border-radius: 50%;
  }

  /* ===== SERVICES ===== */
  #servicos {
    background: var(--bg-secondary);
    position: relative;
    overflow: hidden;
  }

  #servicos::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(245, 158, 11, 0.3), transparent);
  }

  #servicos::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(245, 158, 11, 0.3), transparent);
  }

  .services-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 20px;
  }

  .service-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px 24px;
    text-align: center;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
    cursor: default;
  }

  .service-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--gold-dark), var(--gold), var(--gold-light));
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .service-card:hover {
    transform: translateY(-6px);
    border-color: rgba(245, 158, 11, 0.3);
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(245, 158, 11, 0.1);
  }

  .service-card:hover::before {
    opacity: 1;
  }

  .service-card.featured {
    border-color: rgba(245, 158, 11, 0.4);
    background: linear-gradient(145deg, #1E1E1E, #1A1A1A);
  }

  .service-card.featured::before {
    opacity: 1;
  }

  .service-badge-featured {
    position: absolute;
    top: 16px;
    right: 16px;
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    color: #000;
    font-size: 9px;
    font-weight: 800;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 50px;
  }

  .service-icon-wrap {
    width: 72px;
    height: 72px;
    background: linear-gradient(135deg, rgba(245, 158, 11, 0.15), rgba(245, 158, 11, 0.05));
    border: 1px solid rgba(245, 158, 11, 0.2);
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
    font-size: 32px;
    transition: all 0.3s ease;
  }

  .service-card:hover .service-icon-wrap {
    background: linear-gradient(135deg, rgba(245, 158, 11, 0.25), rgba(245, 158, 11, 0.1));
    transform: scale(1.05);
    box-shadow: 0 0 20px rgba(245, 158, 11, 0.2);
  }

  .service-name {
    font-size: 18px;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 8px;
  }

  .service-description {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.6;
    margin-bottom: 20px;
  }

  .service-divider {
    height: 1px;
    background: var(--border);
    margin: 20px 0;
  }

  .service-price-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .service-price {
    font-size: 30px;
    font-weight: 900;
    color: var(--gold);
  }

  .service-price-label {
    font-size: 12px;
    color: var(--text-secondary);
    text-align: left;
    line-height: 1.4;
  }

  .service-cta {
    display: block;
    margin-top: 20px;
    background: transparent;
    border: 1.5px solid rgba(37, 211, 102, 0.4);
    color: var(--whatsapp);
    text-decoration: none;
    font-size: 13px;
    font-weight: 700;
    padding: 10px;
    border-radius: 8px;
    transition: all 0.3s ease;
    text-align: center;
  }

  .service-cta:hover {
    background: rgba(37, 211, 102, 0.1);
    border-color: var(--whatsapp);
    transform: scale(1.02);
  }

  /* ===== REVIEWS ===== */
  #avaliacoes {
    background: var(--bg-primary);
  }

  .rating-hero {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    margin-bottom: 56px;
    padding: 40px 24px;
    background: var(--bg-card);
    border-radius: 20px;
    border: 1px solid rgba(245, 158, 11, 0.2);
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .rating-hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, rgba(245, 158, 11, 0.05) 0%, transparent 70%);
  }

  .rating-google-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid var(--border);
    padding: 6px 16px;
    border-radius: 50px;
    font-size: 12px;
    color: var(--text-secondary);
    font-weight: 600;
    letter-spacing: 1px;
  }

  .google-g {
    width: 16px;
    height: 16px;
    background: linear-gradient(135deg, #4285F4, #EA4335, #FBBC05, #34A853);
    border-radius: 50%;
    display: inline-block;
  }

  .rating-number {
    font-size: clamp(60px, 12vw, 100px);
    font-weight: 900;
    background: linear-gradient(135deg, var(--gold-light), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
  }

  .rating-stars {
    display: flex;
    gap: 6px;
    font-size: 28px;
  }

  .rating-count {
    font-size: 15px;
    color: var(--text-secondary);
  }

  .rating-count strong {
    color: var(--text-primary);
  }

  .reviews-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
  }

  .review-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    transition: all 0.3s ease;
    position: relative;
  }

  .review-card::before {
    content: '"';
    position: absolute;
    top: 16px;
    right: 20px;
    font-size: 64px;
    color: rgba(245, 158, 11, 0.1);
    font-family: Georgia, serif;
    line-height: 1;
  }

  .review-card:hover {
    border-color: rgba(245, 158, 11, 0.2);
    transform: translateY(-4px);
    box-shadow: 0 12px 32px rgba(0, 0, 0, 0.3);
  }

  .review-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }

  .review-avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 800;
    color: white;
    flex-shrink: 0;
  }

  .avatar-1 { background: linear-gradient(135deg, #6366F1, #8B5CF6); }
  .avatar-2 { background: linear-gradient(135deg, #F59E0B, #EF4444); }
  .avatar-3 { background: linear-gradient(135deg, #10B981, #3B82F6); }

  .review-author-info {
    flex: 1;
  }

  .review-author-name {
    font-size: 15px;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 2px;
  }

  .review-date {
    font-size: 12px;
    color: var(--text-secondary);
  }

  .review-stars {
    font-size: 14px;
    margin-bottom: 12px;
    display: flex;
    gap: 2px;
  }

  .review-text {
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.7;
  }

  .review-verified {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    margin-top: 14px;
    font-size: 11px;
    color: var(--whatsapp);
    font-weight: 600;
  }

  /* ===== CONTACT ===== */
  #contato {
    background: var(--bg-secondary);
    position: relative;
  }

  #contato::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(245, 158, 11, 0.3), transparent);
  }

  .contact-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 40px;
    align-items: start;
  }

  .contact-info {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .contact-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    display: flex;
    align-items: flex-start;
    gap: 16px;
    transition: all 0.3s ease;
    text-decoration: none;
    color: inherit;
  }

  a.contact-card:hover {
    border-color: rgba(245, 158, 11, 0.3);
    transform: translateX(4px);
  }

  .contact-card-icon {
    width: 46px;
    height: 46px;
    background: linear-gradient(135deg, rgba(245, 158, 11, 0.15), rgba(245, 158, 11, 0.05));
    border: 1px solid rgba(245, 158, 11, 0.2);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .contact-card-content {
